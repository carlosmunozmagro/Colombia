<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Colombia · Carlos & Adriana</title>
<meta name="description" content="Guía de viaje Colombia 21 jul – 4 ago 2026">
<meta name="theme-color" content="#10393B">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Colombia">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --ink:#17302E; --ink-soft:#4A615E; --paper:#FBFAF4; --card:#FFFFFF;
  --line:#E4E0D2; --deep:#10393B;
  --ctg:#E2574C; --sal:#3E8E5A; --med:#C94F7C; --adz:#1699A3; --bog:#C99527;
  --radius:16px; --nav-h:64px;
  --stripe:linear-gradient(90deg,#0E7C86 0%,#12A5A0 18%,#35C4B5 36%,#7FD8C9 52%,#B8E8DB 66%,#E2574C 82%,#C99527 100%);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'Karla',system-ui,sans-serif;background:var(--paper);color:var(--ink);
  font-size:16px;line-height:1.55;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
}
h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;line-height:1.15}
.stripe{height:5px;background:var(--stripe);border-radius:3px}

/* ---------- Header ---------- */
header.app{
  background:var(--deep);color:#F2EFE4;padding:calc(14px + env(safe-area-inset-top)) 18px 16px;
  position:sticky;top:0;z-index:40;
}
header.app .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;opacity:.75;font-weight:700}
header.app h1{font-size:26px;font-weight:900;margin:2px 0 8px}
header.app h1 em{font-style:italic;color:#7FD8C9}
header.app .stripe{opacity:.95}

/* ---------- Layout ---------- */
main{max-width:640px;margin:0 auto;padding:16px 16px 32px}
.view{display:none;animation:fade .25s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- Bottom nav ---------- */
nav.tabs{
  position:fixed;bottom:0;left:0;right:0;z-index:50;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:rgba(251,250,244,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--line);display:flex;
}
nav.tabs button{
  flex:1;background:none;border:none;font-family:'Karla',sans-serif;font-size:11px;font-weight:700;
  color:var(--ink-soft);display:flex;flex-direction:column;align-items:center;gap:3px;padding-top:9px;cursor:pointer;
}
nav.tabs button .ico{font-size:20px;line-height:1}
nav.tabs button.on{color:var(--deep)}
nav.tabs button.on .ico{transform:scale(1.12)}

/* ---------- Cards & chips ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.chip{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;color:#fff}
.muted{color:var(--ink-soft);font-size:14px}
.small{font-size:13px}

/* ---------- Timeline (itinerario) ---------- */
.tl{position:relative;padding-left:26px}
.tl::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:3px;border-radius:2px;background:var(--stripe)}
.tl-item{position:relative;margin-bottom:16px}
.tl-item::before{
  content:"";position:absolute;left:-24px;top:8px;width:13px;height:13px;border-radius:50%;
  background:var(--dot,#888);border:3px solid var(--paper);box-shadow:0 0 0 2px var(--dot,#888);
}
.tl-item .dates{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dot,#666)}
.tl-item h3{font-size:20px;margin:1px 0 3px}
.flight{
  background:#F1F6F2;border:1px dashed #BFD3C5;border-radius:12px;padding:10px 12px;margin:10px 0;
  font-size:13.5px;
}
.flight b{font-family:'Fraunces',serif;font-size:15px}
.flight .code{font-weight:700;letter-spacing:.04em}

/* ---------- City cards grid ---------- */
.city-card{
  display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;
  background:var(--card);border:1px solid var(--line);border-left:6px solid var(--c,#999);
  border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;font-family:inherit;color:inherit;
}
.city-card .em{font-size:28px}
.city-card h3{font-size:19px}
.city-card .muted{margin-top:1px}
.city-card .arrow{margin-left:auto;color:var(--c,#999);font-size:20px;font-weight:700}

/* ---------- City page ---------- */
.city-head{border-radius:var(--radius);padding:20px 18px;color:#fff;margin-bottom:14px;background:var(--c,#333)}
.city-head .back{background:rgba(255,255,255,.22);border:none;color:#fff;font-weight:700;font-size:13px;
  padding:6px 12px;border-radius:999px;cursor:pointer;margin-bottom:10px;font-family:inherit}
.city-head h2{font-size:30px;font-weight:900}
.city-head .dates{font-size:13px;font-weight:700;opacity:.92;margin-top:2px}
.secnav{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.secnav::-webkit-scrollbar{display:none}
.secnav button{
  flex:0 0 auto;border:1.5px solid var(--c,#999);color:var(--c,#333);background:transparent;
  font-family:inherit;font-weight:700;font-size:13px;padding:6px 13px;border-radius:999px;cursor:pointer;
}
.secnav button.on{background:var(--c,#333);color:#fff}
.sec{display:none}
.sec.on{display:block;animation:fade .2s ease}
.sec h3{font-size:17px;margin:16px 0 6px;display:flex;align-items:center;gap:8px}
.sec h3::before{content:"";width:14px;height:5px;border-radius:3px;background:var(--c,#333);display:inline-block}
.sec p{margin-bottom:10px}
.sec ul{padding-left:0;list-style:none}
.sec li{padding:8px 0 8px 0;border-bottom:1px solid var(--line)}
.sec li:last-child{border-bottom:none}
.sec li b{display:block}
.sec li .muted{display:block;margin-top:1px}
.tag{display:inline-block;font-size:11px;font-weight:700;border-radius:6px;padding:1px 7px;margin-left:6px;vertical-align:2px}
.tag.eco{background:#E4F2E7;color:#2C6E44}
.tag.mid{background:#FBEEDB;color:#9A6415}
.tag.top{background:#F6E3EC;color:#A03568}
.note{
  border-radius:12px;padding:12px 14px;margin:12px 0;font-size:14px;
  background:#FFF6E3;border:1px solid #ECD9A6;
}
.note.alert{background:#FDEBE8;border-color:#EFC0B8}
.note b{font-family:'Fraunces',serif}
.dayplan{border-left:3px solid var(--c,#999);padding:2px 0 2px 12px;margin:12px 0}
.dayplan .d{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--c,#666)}

/* ---------- Práctico ---------- */
.pract h2{font-size:22px;margin:6px 0 12px}
details{border:1px solid var(--line);border-radius:var(--radius);background:var(--card);margin-bottom:10px;overflow:hidden}
summary{list-style:none;cursor:pointer;padding:14px 16px;font-weight:700;font-family:'Fraunces',serif;font-size:16.5px;display:flex;align-items:center;gap:10px}
summary::-webkit-details-marker{display:none}
summary .em{font-size:19px}
summary::after{content:"+";margin-left:auto;font-size:20px;color:var(--ink-soft);font-family:'Karla',sans-serif}
details[open] summary::after{content:"–"}
details .bd{padding:0 16px 14px;font-size:14.5px}
details .bd ul{padding-left:18px;margin:6px 0}
details .bd li{margin-bottom:5px}

/* ---------- Tareas ---------- */
.day-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.day-card.today{border:2px solid var(--adz);box-shadow:0 2px 14px rgba(22,153,163,.18)}
.day-card .dh{padding:12px 16px 8px;display:flex;align-items:baseline;gap:8px}
.day-card .dh h3{font-size:16.5px}
.day-card .dh .where{margin-left:auto;font-size:12px;font-weight:700;color:#fff;border-radius:999px;padding:2px 10px}
.day-card .dh .today-tag{font-size:11px;font-weight:700;color:var(--adz)}
.todo{display:flex;align-items:flex-start;gap:11px;padding:10px 16px;border-top:1px solid var(--line);cursor:pointer;user-select:none}
.todo input{margin-top:3px;width:19px;height:19px;accent-color:var(--adz);flex:none;cursor:pointer}
.todo .tx{font-size:14.5px}
.todo.done .tx{text-decoration:line-through;color:var(--ink-soft);opacity:.75}
.todo .ck{font-size:12px;color:var(--ink-soft);display:block}
.todo.checkin{background:#F0F8F8}
.addrow{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--line)}
.addrow input{flex:1;border:1px solid var(--line);border-radius:10px;padding:8px 12px;font:inherit;font-size:14px;background:var(--paper)}
.addrow button{border:none;background:var(--deep);color:#fff;font-weight:700;border-radius:10px;padding:0 14px;font-size:18px;cursor:pointer}
.todo .del{margin-left:auto;border:none;background:none;color:#C0574C;font-size:16px;cursor:pointer;padding:0 2px;flex:none}
.progressbar{height:6px;background:#EAE7DA;border-radius:3px;overflow:hidden;margin:8px 0 14px}
.progressbar i{display:block;height:100%;background:var(--stripe);border-radius:3px;transition:width .3s}

/* ---------- Maps links & conversor ---------- */
a.gm{text-decoration:none;font-size:13px;margin-left:6px;vertical-align:1px}
.hotel-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.22);border:none;color:#fff;
  font-weight:700;font-size:13px;padding:6px 12px;border-radius:999px;cursor:pointer;font-family:inherit;text-decoration:none;margin-top:10px}
.conv .row{display:flex;gap:10px;align-items:center;margin:8px 0}
.conv input{flex:1;min-width:0;border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;font:inherit;font-size:17px;font-weight:700;background:var(--paper)}
.conv .eq{font-size:18px;color:var(--ink-soft)}
.conv .cur{font-weight:700;font-size:14px;color:var(--ink-soft);width:38px;flex:none}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chips button{border:1.5px solid var(--deep);color:var(--deep);background:transparent;font-family:inherit;font-weight:700;
  font-size:13px;padding:6px 12px;border-radius:999px;cursor:pointer}
.rate-row{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:13px;color:var(--ink-soft)}
.rate-row input{width:76px;border:1px solid var(--line);border-radius:8px;padding:4px 8px;font:inherit;font-size:14px;text-align:center;background:var(--paper)}

/* ---------- Mapa por ciudad ---------- */
.map-wrap{height:62vh;min-height:380px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line)}
.map-legend{display:flex;gap:14px;margin:10px 2px 0;font-size:12.5px;color:var(--ink-soft);font-weight:700}
.pin{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50% 50% 50% 8px;
  transform:rotate(0deg);font-size:17px;box-shadow:0 3px 8px rgba(0,0,0,.35);border:2.5px solid #fff}
.leaflet-popup-content{font-family:'Karla',sans-serif;font-size:13.5px;margin:10px 14px}
.leaflet-popup-content b{font-family:'Fraunces',serif;font-size:15px}
.leaflet-popup-content a{color:#0E7C86;font-weight:700;text-decoration:none}

/* ---------- Stats y datos en historias ---------- */
#story .stat{display:flex;align-items:baseline;gap:8px;margin:12px 0 2px;
  opacity:0;transform:translateY(16px);transition:all .5s ease .45s}
#story .mo.vis .stat{opacity:1;transform:none}
#story .stat .n{font-family:'Fraunces',serif;font-weight:900;font-size:44px;color:#FFD98E;text-shadow:0 2px 14px rgba(0,0,0,.4)}
#story .stat .u{font-size:15px;font-weight:700;opacity:.9;max-width:180px;line-height:1.2}
#story .dato{margin-top:14px;opacity:0;transition:opacity .5s ease .55s}
#story .mo.vis .dato{opacity:1}
#story .dato > button{border:1.5px solid rgba(255,255,255,.55);background:rgba(0,0,0,.25);color:#fff;
  font-family:inherit;font-weight:700;font-size:13px;padding:7px 14px;border-radius:999px;cursor:pointer;backdrop-filter:blur(4px)}
#story .dato .dx{display:none;margin-top:10px;font-size:14.5px;line-height:1.5;background:rgba(0,0,0,.35);
  border-left:3px solid #FFD98E;padding:10px 12px;border-radius:0 10px 10px 0;backdrop-filter:blur(4px)}
#story .dato.open .dx{display:block;animation:fade .3s ease}
#story .dato.open > button{display:none}

/* ---------- Modo historia: relato continuo ---------- */
.story-btn{display:flex;align-items:center;gap:10px;width:100%;border:none;cursor:pointer;font-family:inherit;
  background:linear-gradient(100deg,var(--c,#333),color-mix(in srgb,var(--c,#333) 55%,#10393B));
  color:#fff;border-radius:14px;padding:14px 16px;margin:4px 0 14px;text-align:left}
.story-btn .big{font-family:'Fraunces',serif;font-weight:700;font-size:16px}
.story-btn .sub{font-size:12px;opacity:.85}
.story-btn .play{margin-left:auto;font-size:22px}

#story{position:fixed;inset:0;z-index:100;display:none;color:#F4F1E8;background:#0C2224}
#story.on{display:block}
#story::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.55;
  background:radial-gradient(60% 40% at 15% 8%, color-mix(in srgb,var(--sc,#333) 55%, transparent), transparent 70%),
             radial-gradient(50% 35% at 90% 55%, color-mix(in srgb,var(--sc,#333) 35%, transparent), transparent 70%),
             radial-gradient(55% 40% at 20% 95%, color-mix(in srgb,var(--sc,#333) 45%, transparent), transparent 70%);
  animation:aurora 16s ease-in-out infinite alternate}
@keyframes aurora{from{filter:hue-rotate(0deg);transform:translateY(0)}to{filter:hue-rotate(14deg);transform:translateY(-2.5%)}}

/* barra superior fija: año actual + progreso */
#story .top{position:absolute;top:0;left:0;right:0;z-index:8;padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(180deg, rgba(10,28,30,.92), rgba(10,28,30,.6) 70%, transparent);pointer-events:none}
#story .top .cy{font-family:'Fraunces',serif;font-weight:900;font-size:26px;color:#FFD98E;min-width:86px;
  transition:opacity .25s ease}
#story .top .cy.sw{opacity:0}
#story .top .ct2{font-size:12px;font-weight:700;opacity:.8;letter-spacing:.06em;text-transform:uppercase}
#story .pbar{position:absolute;left:0;top:0;height:3px;background:linear-gradient(90deg,#FFD98E,var(--sc,#fff));width:0%;z-index:9}
#story .close{position:absolute;top:calc(16px + env(safe-area-inset-top));right:12px;z-index:10;border:none;
  background:rgba(0,0,0,.45);color:#fff;font-size:16px;width:36px;height:36px;border-radius:50%;cursor:pointer}

#story .flow{position:relative;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;overscroll-behavior:contain}
#story .flow::-webkit-scrollbar{display:none}
#story .wrap{position:relative;max-width:620px;margin:0 auto;
  padding:calc(84px + env(safe-area-inset-top)) 20px calc(40px + env(safe-area-inset-bottom)) 52px}
/* columna vertebral */
#story .wrap::before{content:"";position:absolute;left:27px;top:120px;bottom:140px;width:2.5px;border-radius:2px;
  background:linear-gradient(180deg, transparent, color-mix(in srgb,var(--sc,#fff) 75%, #fff) 6%, color-mix(in srgb,var(--sc,#fff) 55%, transparent) 94%, transparent)}

#story .hero{min-height:56vh;display:flex;flex-direction:column;justify-content:center;margin-left:-30px;padding-bottom:20px}
#story .hero .em{font-size:64px;margin-bottom:8px}
#story .hero h2{font-family:'Fraunces',serif;font-weight:900;font-size:40px;line-height:1.02;letter-spacing:-.01em}
#story .hero p{margin-top:10px;font-size:16px;opacity:.85;max-width:420px}
#story .hero .down{margin-top:26px;font-size:22px;opacity:.85;animation:bob 1.7s ease-in-out infinite;width:fit-content}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(9px)}}

#story .era{position:relative;padding:34px 0 6px}
#story .era .pip{position:absolute;left:-31.5px;top:46px;width:15px;height:15px;border-radius:50%;
  background:#0C2224;border:3px solid color-mix(in srgb,var(--sc,#fff) 80%, #fff);
  box-shadow:0 0 0 0 transparent;transition:all .5s ease}
#story .era.in .pip{background:#FFD98E;border-color:#FFD98E;box-shadow:0 0 18px 2px color-mix(in srgb,#FFD98E 60%, transparent)}
#story .era .y{font-family:'Fraunces',serif;font-weight:900;font-size:56px;line-height:.95;letter-spacing:-.02em;
  color:transparent;-webkit-text-stroke:1.5px rgba(255,217,142,.85);transition:all .8s ease}
#story .era.in .y{color:#FFD98E;-webkit-text-stroke:0px transparent;text-shadow:0 3px 24px rgba(0,0,0,.45)}
#story .era .y small{font-size:20px;-webkit-text-stroke:0;color:#FFD98E;opacity:.85;font-weight:700;margin-left:6px;vertical-align:12px}
#story .era h4{font-family:'Fraunces',serif;font-weight:700;font-size:22px;margin:6px 0 8px}
#story .era .tx{font-size:16.5px;line-height:1.62;opacity:.94}
#story .era .em2{position:absolute;right:-6px;top:22px;font-size:44px;opacity:.28;transform:rotate(8deg)}

/* elementos con revelado al hacer scroll */
#story .rv{opacity:0;transform:translateY(26px);transition:opacity .7s ease, transform .7s cubic-bezier(.2,.7,.2,1)}
#story .rv.in{opacity:1;transform:none}

/* tarjeta de foto integrada */
#story figure.pcard{margin:16px 0 4px;border-radius:18px;overflow:hidden;background:rgba(255,255,255,.06);
  box-shadow:0 10px 32px rgba(0,0,0,.35)}
#story figure.pcard .skel{height:190px;background:linear-gradient(100deg, rgba(255,255,255,.05) 40%, rgba(255,255,255,.13) 50%, rgba(255,255,255,.05) 60%);
  background-size:220% 100%;animation:shine 1.4s linear infinite}
@keyframes shine{to{background-position:-120% 0}}
#story figure.pcard img{width:100%;display:block;max-height:340px;object-fit:cover;
  opacity:0;transform:scale(1.04);transition:opacity .8s ease, transform 1.6s ease}
#story figure.pcard img.ld{opacity:1;transform:scale(1)}
#story figure.pcard figcaption{padding:8px 12px;font-size:11.5px;opacity:.6;display:flex;justify-content:space-between;gap:8px}

#story .stat{display:flex;align-items:baseline;gap:10px;margin:16px 0 4px;padding:12px 14px;border-radius:14px;
  background:rgba(0,0,0,.28);border-left:3px solid #FFD98E;backdrop-filter:blur(3px)}
#story .stat .n{font-family:'Fraunces',serif;font-weight:900;font-size:42px;color:#FFD98E}
#story .stat .u{font-size:14.5px;font-weight:700;opacity:.9;line-height:1.25}
#story .dato{margin:14px 0 4px}
#story .dato > button{border:1.5px solid rgba(255,217,142,.6);background:rgba(255,217,142,.1);color:#FFD98E;
  font-family:inherit;font-weight:700;font-size:13px;padding:8px 15px;border-radius:999px;cursor:pointer}
#story .dato .dx{display:none;margin-top:10px;font-size:14.5px;line-height:1.55;background:rgba(0,0,0,.3);
  border-left:3px solid #FFD98E;padding:11px 13px;border-radius:0 12px 12px 0}
#story .dato.open .dx{display:block;animation:fade .3s ease}
#story .dato.open > button{display:none}

#story .fin{margin:44px 0 10px -30px;text-align:center;padding:26px 18px;border-radius:20px;
  background:linear-gradient(140deg, color-mix(in srgb,var(--sc,#333) 60%, #0C2224), rgba(0,0,0,.3))}
#story .fin .em{font-size:40px}
#story .fin h4{font-family:'Fraunces',serif;font-size:20px;margin:8px 0 4px}
#story .fin p{font-size:14px;opacity:.85;margin-bottom:14px}
#story .fin button{border:none;background:#FFD98E;color:#3B2E10;font-family:inherit;font-weight:700;
  font-size:14.5px;padding:11px 20px;border-radius:999px;cursor:pointer}

@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
button:focus-visible,summary:focus-visible{outline:3px solid #35C4B5;outline-offset:2px}
</style>
</head>
<body>

<header class="app">
  <div class="eyebrow">21 jul – 4 ago 2026 · Carlos & Adriana</div>
  <h1>Colombia, <em>el país de la belleza</em></h1>
  <div class="stripe"></div>
</header>

<main>
  <section id="view-itinerario" class="view on"></section>

const LMAPS = {};
function ensureMap(id){
  if(LMAPS[id] || typeof L==='undefined') return;
  const el = document.getElementById('lmap-'+id);
  if(!el) return;
  const c = CIUDADES.find(x=>x.id===id);
  const m = L.map(el,{scrollWheelZoom:false});
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(m);
  const cols = {v:getComputedStyle(document.documentElement).getPropertyValue('--'+id).trim()||'#333', c:'#E8A13D', h:'#10393B'};
  const ems = {v:'⭐',c:'🍽️',h:'🏨'};
  const bounds = [];
  MAPA[id].forEach(p=>{
    const icon = L.divIcon({html:`<div class="pin" style="background:${cols[p.c]}">${ems[p.c]}</div>`,className:'',iconSize:[34,34],iconAnchor:[17,30]});
    L.marker([p.lat,p.lng],{icon}).addTo(m)
      .bindPopup(`<b>${p.n}</b><br>${p.x}<br><a href="${gmaps(p.n.replace(' 🏨','')+', '+c.nombre.split('&')[0]+', Colombia')}" target="_blank" rel="noopener">Cómo llegar ›</a>`);
    bounds.push([p.lat,p.lng]);
  });
  m.fitBounds(bounds,{padding:[28,28]});
  LMAPS[id]=m;
  setTimeout(()=>m.invalidateSize(),150);
}

  entries.splice(2, 0, ["🗺️ Mapa", `<div class="map-wrap" id="lmap-${id}"></div>

  document.getElementById('view-ciudad').innerHTML = `

function hoyKey(){
  const n = new Date();
  if(n.getFullYear()!==2026) return null;
  return String(n.getMonth()+1).padStart(2,'0') + String(n.getDate()).padStart(2,'0');
}
function allItems(){ 
  const custom = store.get(KEY_CUSTOM) || {};
  return DIAS.flatMap(d=>[...d.items, ...(custom[d.k]||[])]);
}
function renderTareas(){
  const done = store.get(KEY_DONE) || {};
  const custom = store.get(KEY_CUSTOM) || {};
  const items = allItems();
  const nDone = items.filter(i=>done[i.id]).length;
  const hk = hoyKey();
  document.getElementById('view-tareas').innerHTML = `
    <div class="card" style="border-left:6px solid var(--deep)">
      <h2 style="font-size:20px">Tareas del viaje</h2>
      <p class="muted small" style="margin:4px 0 8px">${nDone}/${items.length} completadas. Se guardan en este móvil ✓</p>
      <div class="progressbar"><i style="width:${items.length?Math.round(nDone/items.length*100):0}%"></i></div>
    </div>
    ${DIAS.map(d=>{
      const extra = custom[d.k]||[];
      const today = d.k===hk;
      return `
      <div class="day-card ${today?'today':''}">
        <div class="dh"><h3>${d.f}</h3>${today?'<span class="today-tag">HOY</span>':''}<span class="where" style="background:${d.wc}">${d.w}</span></div>
        ${[...d.items, ...extra].map(it=>`
          <label class="todo ${done[it.id]?'done':''} ${it.ci?'checkin':''}">
            <input type="checkbox" ${done[it.id]?'checked':''} onchange="toggleTodo('${it.id}')">
            <span class="tx">${it.ci?'✈️ ':''}${it.t}${it.c?`<span class="ck">${it.c}</span>`:''}</span>
            ${it.custom?`<button class="del" onclick="delTodo(event,'${d.k}','${it.id}')" aria-label="Borrar">✕</button>`:''}
          </label>`).join('')}
        <div class="addrow">
          <input id="add-${d.k}" placeholder="Añadir tarea…" onkeydown="if(event.key==='Enter')addTodo('${d.k}')">
          <button onclick="addTodo('${d.k}')" aria-label="Añadir">+</button>
        </div>
      </div>`;
    }).join('')}
  `;
}
function toggleTodo(id){
  const done = store.get(KEY_DONE) || {};
  done[id] = !done[id];
  store.set(KEY_DONE, done);
  renderTareas();
}
function addTodo(dk){
  const inp = document.getElementById('add-'+dk);
  const t = (inp.value||'').trim();
  if(!t) return;
  const custom = store.get(KEY_CUSTOM) || {};
  (custom[dk] ||= []).push({id:'c-'+Date.now(), t, custom:true});
  store.set(KEY_CUSTOM, custom);
  renderTareas();
}
function delTodo(ev,dk,id){
  ev.preventDefault();
  const custom = store.get(KEY_CUSTOM) || {};
  custom[dk] = (custom[dk]||[]).filter(x=>x.id!==id);
  store.set(KEY_CUSTOM, custom);
  renderTareas();
}

/* Fotos: imagen principal del artículo de Wikipedia (licencia libre), resuelta en runtime.
   Si no hay red o falla, queda el fondo degradado de la ciudad — nunca se ve roto. */
const WIKI_CACHE = {};
async function wikiImg(title, lang){
  const key = lang+':'+title;
  if(WIKI_CACHE[key] !== undefined) return WIKI_CACHE[key];
  try{
    const r = await fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
    if(!r.ok) throw 0;
    const j = await r.json();
    let u = null;
    if(j.originalimage && j.originalimage.width <= 3200) u = j.originalimage.source;
    else if(j.thumbnail) u = j.thumbnail.source;
    else if(j.originalimage) u = j.originalimage.source;
    WIKI_CACHE[key] = u || null;
    return WIKI_CACHE[key];
  }catch(e){ WIKI_CACHE[key] = null; return null; }
}

let stIO=null, stIO2=null;
function openStory(id){
  const st = STORIES[id];
  const c = CIUDADES.find(x=>x.id===id);
  const s = document.getElementById('story');
  const flow = s.querySelector('.flow');
  const wrap = s.querySelector('.wrap');
  s.style.setProperty('--sc', st.color);
  s.querySelector('.ct2').textContent = c.nombre.split('&')[0].trim();
  s.querySelector('.cy').textContent = '';

  wrap.innerHTML = `
    <div class="hero">
      <div class="em">${c.em}</div>
      <h2>${c.nombre}</h2>
      <p>${st.slides.length} momentos que explican este lugar. Sigue bajando — la historia se va encendiendo sola.</p>
      <div class="down">⌄</div>
    </div>
    ${st.slides.map((sl,i)=>`
    <section class="era" data-y="${sl.y}">
      <span class="pip"></span>
      <span class="em2">${sl.e}</span>
      <div class="y rv">${sl.y}</div>
      <h4 class="rv">${sl.t}</h4>
      <p class="tx rv">${sl.x}</p>
      ${sl.w?`<figure class="pcard rv" data-w="${sl.w}" data-lang="${sl.lang||'es'}"><div class="skel"></div><figcaption><span>${sl.t}</span><span>📷 Wikipedia</span></figcaption></figure>`:''}
      ${sl.st?`<div class="stat rv"><span class="n" data-n="${sl.st.n}">0</span><span class="u">${sl.st.u}</span></div>`:''}
      ${sl.d?`<div class="dato rv"><button onclick="this.parentElement.classList.add('open');if(navigator.vibrate)navigator.vibrate(8)">✨ Dato curioso</button><div class="dx">${sl.d}</div></div>`:''}
    </section>`).join('')}
    <div class="fin">
      <div class="em">${c.em}</div>
      <h4>Y la historia continúa con vosotros</h4>
      <p>${c.fechas} · ahora id a pisarla.</p>
      <button onclick="closeStory()">Volver a la guía ›</button>
    </div>`;

  s.classList.add('on');
  document.body.style.overflow='hidden';
  flow.scrollTop = 0;

  /* revelado progresivo + contadores */
  if(stIO) stIO.disconnect();
  stIO = new IntersectionObserver(ens=>{
    ens.forEach(en=>{
      if(!en.isIntersecting) return;
      en.target.classList.add('in');
      stIO.unobserve(en.target);
      const num = en.target.matches('.stat') ? en.target.querySelector('.n') : null;
      if(num && !num.dataset.done){
        num.dataset.done=1;
        const target=+num.dataset.n, t0=performance.now(), dur=1400;
        (function tick(t){
          const p=Math.min((t-t0)/dur,1), ease=1-Math.pow(1-p,3);
          num.textContent=Math.round(target*ease).toLocaleString('es');
          if(p<1) requestAnimationFrame(tick);
        })(t0);
      }
      /* carga perezosa de foto justo cuando su tarjeta entra */
      if(en.target.matches('figure.pcard') && !en.target.dataset.ld){
        en.target.dataset.ld=1;
        loadPhoto(en.target);
      }
    });
  },{root:flow, threshold:.18, rootMargin:'0px 0px -6% 0px'});
  wrap.querySelectorAll('.rv').forEach(el=>stIO.observe(el));

  /* año fijo arriba + pip encendido + vibración por era */
  if(stIO2) stIO2.disconnect();
  const cy = s.querySelector('.cy');
  stIO2 = new IntersectionObserver(ens=>{
    ens.forEach(en=>{
      if(!en.isIntersecting) return;
      en.target.classList.add('in');
      const y = en.target.dataset.y;
      if(cy.textContent!==y){
        cy.classList.add('sw');
        setTimeout(()=>{cy.textContent=y; cy.classList.remove('sw');},180);
        if(navigator.vibrate) navigator.vibrate(5);
      }
    });
  },{root:flow, threshold:0, rootMargin:'-38% 0px -52% 0px'});
  wrap.querySelectorAll('.era').forEach(el=>stIO2.observe(el));

  /* barra de progreso */
  flow.onscroll = ()=>{
    const p = flow.scrollTop/(flow.scrollHeight-flow.clientHeight);
    s.querySelector('.pbar').style.width = (p*100).toFixed(1)+'%';
  };
}
async function loadPhoto(fig){
  const u = await wikiImg(fig.dataset.w, fig.dataset.lang);
  if(!u){ fig.remove(); return; }
  const im = new Image();
  im.onload = ()=>{
    const sk = fig.querySelector('.skel');
    im.classList.add('ld');
    fig.insertBefore(im, sk);
    sk.remove();
  };
  im.onerror = ()=>fig.remove();
  im.src = u;
}
function closeStory(){
  document.getElementById('story').classList.remove('on');
  if(stIO) stIO.disconnect();
  if(stIO2) stIO2.disconnect();
  document.body.style.overflow='';
}
document.addEventListener('keydown', e=>{
  const s=document.getElementById('story');
  if(!s.classList.contains('on')) return;
  const f=s.querySelector('.flow');
  if(e.key==='Escape') closeStory();
  if(e.key==='ArrowDown') f.scrollBy({top:f.clientHeight*.7,behavior:'smooth'});
  if(e.key==='ArrowUp') f.scrollBy({top:-f.clientHeight*.7,behavior:'smooth'});
});

/* ================= CONVERSOR ================= */
function getRate(){ return store.get('co-rate') || 4500; }
function setRate(){
  const v = parseFloat(document.getElementById('rate').value.replace(',','.'));
  if(v>0) store.set('co-rate', v);
  document.getElementById('rate').value = getRate();
  convFrom('cop');
}
function convFrom(src){
  const cop = document.getElementById('cop'), eur = document.getElementById('eur');
  const num = s => parseFloat(String(s).replace(/\./g,'').replace(',','.'));
  if(src==='cop'){
    const v = num(cop.value);
    eur.value = isFinite(v) ? (v/getRate()).toLocaleString('es',{maximumFractionDigits:2}) : '';
  }else{
    const v = parseFloat(String(eur.value).replace(',','.'));
    cop.value = isFinite(v) ? Math.round(v*getRate()).toLocaleString('es') : '';
  }
}
function setCop(v){
  document.getElementById('cop').value = v.toLocaleString('es');
  convFrom('cop');
}
document.getElementById('rate').value = getRate();
setCop(50000);

/* ================= NAVEGACIÓN (con botón atrás del móvil) ================= */
function go(v, id){
  const hash = v==='ciudad' ? '#ciudad-'+id : '#'+v;
  if(location.hash !== hash){ location.hash = hash; return; } /* hashchange renderiza */
  render(v, id);
}
function render(v, id){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  document.getElementById('view-'+v).classList.add('on');
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('on'));
  const tb = document.getElementById('tab-'+(v==='ciudad'?'ciudades':v)); if(tb) tb.classList.add('on');
  window.scrollTo({top:0});
}
function route(){
  const hsh = location.hash || '#itinerario';
  if(hsh.startsWith('#ciudad-')){ buildCity(hsh.slice(8)); render('ciudad'); }
  else{
    const v = hsh.slice(1);
    render(['itinerario','ciudades','tareas','practico'].includes(v) ? v : 'itinerario');
  }
}
window.addEventListener('hashchange', route);
route();
