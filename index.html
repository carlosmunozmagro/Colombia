ctg:`<span class="rtime">📖 Lectura de ~20 min</span>
<p class="lead">Cartagena no se entiende como una ciudad, sino como una fortaleza que resultó ser bellísima. Todo lo que veréis —las murallas, los balcones, el color, incluso la comida— existe porque durante trescientos años esta fue la caja fuerte del imperio español en América, y todo el mundo quería reventarla.</p>

<h3>Por qué existe Cartagena</h3>
<p>Miradlo en un mapa. La bahía de Cartagena es una bolsa de agua protegida, con dos bocas estrechas, capaz de albergar una flota entera a salvo de los huracanes del Caribe. En 1533 Pedro de Heredia fundó aquí una ciudad y en cuestión de décadas se convirtió en el puerto donde se concentraba todo: la plata de Potosí subida desde el Perú, el oro de Nueva Granada, las esmeraldas de Muzo. Una vez al año partía de aquí la Flota de Indias hacia Sevilla cargada con la riqueza de medio continente.</p>
<p>Eso convirtió a Cartagena en el objetivo más goloso del Atlántico. En 1544 la saqueó el francés Roberto Baal; en 1586, Francis Drake, que la ocupó cien días y solo se marchó tras cobrar un rescate descomunal en oro; en 1697 el barón de Pointis con una flota francesa. Cada saqueo tuvo la misma consecuencia: más piedra. Las murallas que hoy recorréis al atardecer no son decorativas: son la respuesta acumulada a dos siglos de miedo. Once kilómetros de muro de hasta veinte metros de espesor, levantados con coral extraído del fondo del mar, que tardaron doscientos años en completarse y costaron tanto que en Madrid corría el chiste de que desde el palacio real deberían verse ya asomando por el horizonte.</p>
<p>Es importante entender esto porque cambia la forma de mirar. Cuando paseéis por la muralla al caer el sol, con la brisa y los vendedores de cerveza, estáis caminando sobre una obra de ingeniería militar diseñada por ingenieros que nunca imaginaron que su fortaleza terminaría siendo el sitio más romántico de Colombia.</p>

<h3>Blas de Lezo y la batalla que Inglaterra intentó olvidar</h3>
<p>En 1741 llegó el ataque definitivo. El almirante británico Edward Vernon se presentó ante Cartagena con unos 186 barcos y más de 25.000 hombres: la mayor flota anfibia hasta el desembarco de Normandía. Enfrente, un puñado de defensores y seis navíos al mando de Blas de Lezo, un marino vasco que a esas alturas de su vida había perdido una pierna, un ojo y el uso de un brazo en distintas batallas. Le llamaban "Mediohombre".</p>
<p>Vernon estaba tan seguro del resultado que envió a Inglaterra la noticia de la victoria antes de tomar la ciudad, y se acuñaron medallas conmemorativas mostrando a Lezo arrodillado. Aún se conservan. Lo que ocurrió fue lo contrario: Lezo hundió sus propios barcos para bloquear los canales, resistió en el castillo de San Felipe, alargó el asedio hasta que las enfermedades tropicales diezmaron a los ingleses, y Vernon se retiró tras dos meses con miles de muertos. Es una de las derrotas más humillantes de la historia naval británica, y durante mucho tiempo estuvo prácticamente prohibido hablar de ella en Inglaterra.</p>
<p>Lezo murió pocos meses después, enfermo y en desgracia política, y fue enterrado en un lugar que nunca se identificó con certeza. Su estatua está frente al castillo de San Felipe: id a verla y quedaos un minuto. Es difícil encontrar una historia mejor en todo el Caribe.</p>

<h3>La otra Cartagena: el puerto de esclavos</h3>
<p>Hay una parte de la historia que las postales no cuentan y que conviene conocer antes de pisar la ciudad. Cartagena fue, junto con Veracruz, el gran puerto negrero de la América española. Por sus muelles entraron cientos de miles de africanos esclavizados durante dos siglos. La Plaza de los Coches, esa plaza preciosa junto a la Torre del Reloj por donde pasaréis mil veces, fue el mercado donde se les vendía.</p>
<p>De ahí nace lo más extraordinario: <strong>San Basilio de Palenque</strong>. A finales del siglo XVI, un grupo de esclavizados liderado por Benkos Biohó escapó a los montes y fundó un poblado fortificado que la Corona nunca logró someter. En 1691 tuvo que reconocer su libertad por decreto: fue el primer pueblo libre de América. Todavía existe, a unos cincuenta kilómetros de aquí, y allí se habla el palenquero, la única lengua criolla del mundo con base española. Su cultura —los tambores, los peinados como mapas de rutas de fuga, los ritos funerarios del lumbalú— está declarada Patrimonio Inmaterial de la Humanidad.</p>
<p>Las <em>palenqueras</em>, esas mujeres con vestidos de colores y palanganas de fruta en la cabeza que veréis en la ciudad amurallada, descienden de esa historia. Se ganan la vida vendiendo fruta y posando para fotos; si les hacéis una, es costumbre pagarles (unos 10.000 pesos suele estar bien) y conviene pactarlo antes con una sonrisa.</p>
<p>También merece un momento la figura de <strong>San Pedro Claver</strong>, el jesuita catalán que durante cuarenta años bajó a los barcos negreros a atender a los recién llegados, y que se autodenominaba "esclavo de los esclavos para siempre". Su iglesia, junto a la plaza que lleva su nombre, es uno de los edificios más serenos del centro.</p>

<h3>Barrio por barrio</h3>

<div class="barrio"><div class="meta">El corazón turístico</div><h4>El Centro y San Diego</h4>
<p>Lo que todo el mundo llama "la ciudad amurallada" son en realidad dos barrios. <strong>El Centro</strong> era la zona de los nobles y el clero: calles de casas encaladas, balcones de madera cargados de buganvilla, plazas con iglesias enormes. Aquí están la Plaza de Santo Domingo (con la gorda de Botero recostada, a la que todo el mundo toca), la Plaza de Bolívar y el Museo del Oro Zenú. <strong>San Diego</strong>, hacia el norte, era la zona de artesanos y comerciantes: más pequeño, más tranquilo, con la plaza homónima llena de mesas por la noche y las Bóvedas, antiguos almacenes de munición reconvertidos en tiendas de artesanía.</p>
<p>Consejo: la ciudad amurallada se recorre sin plan. Es de las pocas ciudades del mundo donde perderse a propósito da mejores resultados que cualquier itinerario. Hacedlo a primera hora (antes de las 10) o a partir de las 17:00; entre medias el calor es brutal.</p></div>

<div class="barrio"><div class="meta">Donde late la vida</div><h4>Getsemaní</h4>
<p>Extramuros, pegado a la muralla, estaba el barrio de los artesanos, los negros libres y los trabajadores del puerto. Fue el barrio que encendió la independencia en 1811 —los llamados "lanceros de Getsemaní"—, luego cayó en decadencia y a finales del siglo XX tenía muy mala fama. Hoy es la zona más viva y más interesante de Cartagena: calles con banderines de colores, murales enormes, hostales bohemios, bares diminutos.</p>
<p>El centro de todo es la <strong>Plaza de la Trinidad</strong>. Al caer la tarde se llena de vecinos, niños jugando al fútbol, puestos de arepas y carimañolas, gente bebiendo cerveza sentada en las escaleras de la iglesia. Es gratis, es auténtico y es probablemente el mejor plan nocturno de la ciudad. La calle de la Sierpe y el callejón Angosto concentran el arte urbano.</p>
<p>Getsemaní vive una gentrificación acelerada y es un tema de conversación local: muchas familias de toda la vida han vendido sus casas a hoteles boutique. Si habláis con alguien del barrio, os lo contarán.</p></div>

<div class="barrio"><div class="meta">Vuestra base</div><h4>La Boquilla, Cielo Mar y la Zona Norte</h4>
<p>Aquí está vuestro hotel, el Faranda Collection. Es la franja de playa que se extiende al norte del aeropuerto: hoteles nuevos, mar abierto, y pegado, <strong>La Boquilla</strong>, un pueblo de pescadores afrocolombianos que ha quedado engullido por el desarrollo turístico pero conserva su identidad. Allí se puede hacer un paseo en canoa por los manglares con pescadores locales (muy recomendable, temprano por la mañana) y comer pescado frito en las casetas de la playa, mucho mejor y más barato que en cualquier hotel.</p>
<p>Lo importante en clave práctica: estáis a 15-20 minutos en taxi del centro histórico, así que conviene pensar los días en bloques —bajar al centro y quedarse unas horas, en vez de ir y volver varias veces. La ventaja enorme es el aeropuerto a diez minutos, tanto al llegar de madrugada el día 21 como al salir el 25.</p></div>

<div class="barrio"><div class="meta">La Cartagena moderna</div><h4>Bocagrande</h4>
<p>La península de rascacielos que se ve desde la muralla. Es el barrio residencial acomodado, lleno de torres de apartamentos, centros comerciales y cadenas hoteleras; la gente lo compara con Miami y no va desencaminada. La playa es de arena grisácea y con bastante venta ambulante. No es una prioridad turística, pero es el sitio donde ver a la Cartagena que vive, trabaja y va al gimnasio.</p></div>

<h3>Comer en la costa: el mapa mental</h3>
<p>La cocina caribeña colombiana tiene tres pilares: el pescado, el coco y el frito. Entenderlo os ahorrará muchas dudas de carta.</p>
<p>El <strong>arroz de coco</strong> (arroz con leche de coco y un punto dulce por el caramelo del titoté) acompaña casi todo pescado. El <strong>patacón</strong> es plátano verde aplastado y frito dos veces; si es enorme y lleva cosas encima, es un "patacón con todo". Las <strong>arepas de huevo</strong> —masa de maíz frita con un huevo dentro— son el desayuno costeño por antonomasia y se comen de pie, en la calle, antes de las nueve. La <strong>carimañola</strong> es un torpedo de yuca relleno de carne. La <strong>posta negra</strong> es carne cocinada largo rato en una salsa oscura y dulzona: el plato de domingo familiar.</p>
<p>Del mar: la <strong>mojarra frita</strong> entera (con cabeza, ojos incluidos, así se come), el pargo rojo, el ceviche —aquí más suave y a menudo con toque de salsa rosada, no confundir con el peruano— y el cóctel de camarones. En temporada, la <strong>langosta</strong>. Y de postre, cocadas de las palenqueras, o unas <strong>butifarras</strong> soledeñas si os las cruzáis.</p>
<blockquote>Regla de oro: donde comen los taxistas se come bien y barato. Los almuerzos ejecutivos de mediodía (sopa + principal + jugo, 15-25.000 pesos) son la mejor relación calidad-precio de Colombia.</blockquote>
<p>Para beber: <strong>limonada de coco</strong> (batida con leche de coco, adictiva), jugos de frutas que no habéis visto nunca —lulo, corozo, zapote, níspero, guanábana, tomate de árbol—, agua de coco directamente del coco. Cerveza: Águila es la costeña, Club Colombia si queréis algo mejor. Y el ron: Ron Viejo de Caldas, o el Dictador cartagenero, que es excelente.</p>

<h3>Cultura viva: qué está pasando ahora mismo</h3>
<p>Cartagena es la capital de la <strong>champeta</strong>, un género nacido en los barrios afrodescendientes a partir de la música africana que llegaba en discos con los marineros. Se baila pegado y con mucha cadera, suena en picós (enormes equipos de sonido pintados a mano) y desde hace unos años ha saltado al mainstream: si escucháis a Charles King o a Mr. Black, eso es champeta. En los bares del centro sonará más salsa y vallenato, pero la champeta es lo genuinamente local.</p>
<p>El <strong>vallenato</strong> —acordeón, caja y guacharaca— es del interior de la costa (Valledupar), pero se escucha en todas partes; sus letras cuentan historias largas, y hay quien dice que Cien años de soledad es un vallenato de 400 páginas. García Márquez, que vivió aquí y ambientó en la ciudad El amor en los tiempos del cólera, lo dijo casi con esas palabras.</p>
<p>Y algo que sorprende a los españoles: el costeño habla rápido, se come las eses finales y usa el "usted" con la gente cercana y el "tú" con desconocidos, justo al revés de lo que uno esperaría. No os preocupéis: en tres días os entra el oído.</p>

<h3>Cómo comportarse (y no dar papaya)</h3>
<p>Cartagena es turística y segura en las zonas por las que os vais a mover, pero tiene una intensidad comercial que agota si no se sabe gestionar. En la ciudad amurallada os van a ofrecer sombreros, gafas, masajes, tours, fruta y fotos cada cincuenta metros. La técnica local es un "no, gracias" amable y seguir caminando sin detenerse; pararse a explicar alarga la conversación diez minutos.</p>
<p>Pactad siempre el precio antes de subir a un taxi (no llevan taxímetro) o usad Uber/inDrive. Del hotel al centro deberían ser unos 25-35.000 pesos. Si os ofrecen una excursión a Islas del Rosario en la calle, comprobad que la lancha sea de una empresa registrada y que incluya el impuesto de muelle.</p>
<p>Y una recomendación de ritmo: julio es húmedo y caluroso, con chubascos cortos por la tarde. No intentéis exprimir el día. Los cartageneros no lo hacen: la ciudad se para entre las 12 y las 15, y vuelve a la vida cuando baja el sol. Copiadles.</p>

<h3>Para el buceo de Carlos</h3>
<p>Cartagena es un sitio razonable para certificarse: hay escuelas serias, el mar está caliente todo el año (28-29 °C, apenas hace falta traje) y las inmersiones se hacen en las Islas del Rosario, un parque nacional con arrecifes coralinos. La visibilidad en julio es moderada (10-20 m) porque es época de lluvias suaves; no es el Caribe de postal de Providencia, pero para un Open Water es perfecto: aguas tranquilas, poca corriente, fondo de arena para practicar ejercicios.</p>
<p>El curso estándar son tres días: teoría y piscina el primero, dos inmersiones en mar abierto el segundo y dos más el tercero. Preguntad por el tamaño del grupo (idealmente cuatro alumnos por instructor) y confirmad que la certificación (PADI o SSI, ambas válidas internacionalmente) va incluida en el precio. Y lo más importante para vuestro itinerario: la última inmersión debe terminar con al menos 18-24 horas de margen antes de volar. Con el último buceo el viernes por la mañana y el vuelo el sábado a las 20:28, vais sobrados.</p>
`,
};

const LMAPS = {};
function ensureMap(id){
  if(LMAPS[id] || typeof L==='undefined') return;
  const el = document.getElementById('lmap-'+id);
  if(!el) return;
  const c = CIUDADES.find(x=>x.id===id);
  const m = L.map(el,{scrollWheelZoom:false});
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(m);
  const cols = {v:getComputedStyle(document.documentElement).getPropertyValue('--'+id).trim()||'#333', c:'#E8A13D', h:'#10393B'};
  const ems = {v:'⭐',c:'🍽️',h:'🏨'};
  const bounds = [];
  MAPA[id].forEach(p=>{
    const icon = L.divIcon({html:`<div class="pin" style="background:${cols[p.c]}">${ems[p.c]}</div>`,className:'',iconSize:[34,34],iconAnchor:[17,30]});
    L.marker([p.lat,p.lng],{icon}).addTo(m)
      .bindPopup(`<b>${p.n}</b><br>${p.x}<br><a href="${gmaps(p.n.replace(' 🏨','')+', '+c.nombre.split('&')[0]+', Colombia')}" target="_blank" rel="noopener">Cómo llegar ›</a>`);
    bounds.push([p.lat,p.lng]);
  });
  m.fitBounds(bounds,{padding:[28,28]});
  LMAPS[id]=m;
  setTimeout(()=>m.invalidateSize(),150);
}

function buildCity(id){
  const c = CIUDADES.find(x=>x.id===id);
  const secs = {...c.secs};
  const entries = Object.entries(secs);
  if(LECTURA[id]) entries.splice(1, 0, ["📖 Lectura larga", `<div class="longread" style="--c:${c.color}">${LECTURA[id]}</div>`]);
  if(FACTS[id]) entries.splice(2, 0, ["💡 Curiosidades", factsHTML(id)]);
  entries.splice(3, 0, ["🗺️ Mapa", `<div class="map-wrap" id="lmap-${id}"></div>
    <div class="map-legend"><span>⭐ Qué ver</span><span>🍽️ Comer</span><span>🏨 Hotel</span></div>
    <p class="muted small" style="margin-top:8px">Toca un pin para ver el consejo y abrir la ruta en Google Maps.</p>`]);

  c._secs = Object.fromEntries(entries);
  document.getElementById('view-ciudad').innerHTML = `
    <div class="city-head" style="--c:${c.color};background:${c.color}">
      <button class="back" onclick="go('ciudades')">‹ Ciudades</button>
      <h2>${c.em} ${c.nombre}</h2>
      <div class="dates">${c.fechas} · ${c.intro}</div>
      ${HOTELES[c.id]?`<a class="hotel-btn" href="${gmaps(HOTELES[c.id])}" target="_blank" rel="noopener">🏨 Vuestro hotel en Maps ›</a>`:""}
    </div>
    <div class="secnav" style="--c:${c.color}">
      ${keys.map((k,i)=>`<button class="${i===0?'on':''}" style="--c:${c.color}" onclick="openSec(this,'${c.id}-s${i}')">${k}</button>`).join("")}
    </div>
    ${keys.map((k,i)=>`<div class="sec ${i===0?'on':''}" id="${c.id}-s${i}" style="--c:${c.color}">${c._secs[k]}</div>`).join("")}
  `;
  /* botón de modo historia al inicio de la sección Historia */
  const hist = document.getElementById(c.id+'-s0');
  if(hist && STORIES[c.id]){
    hist.insertAdjacentHTML('afterbegin',
      `<button class="story-btn" style="--c:${c.color}" onclick="openStory('${c.id}')">
        <span><span class="big">▶ Leer el relato</span><br><span class="sub">${STORIES[c.id].slides.length} momentos que explican ${c.nombre.split('&')[0].trim()}</span></span>
        <span class="play">📜</span>
      </button>`);
  }
  /* añade 📍 a cada sitio/restaurante de las listas */
  document.querySelectorAll('#view-ciudad .sec li > b').forEach(b=>{
    const name = Array.from(b.childNodes).filter(n=>n.nodeType===3).map(n=>n.textContent).join('').trim();
    if(name.length>2) b.insertAdjacentHTML('beforeend', gmLink(name + ', ' + c.nombre.split('&')[0].trim() + ', Colombia'));
  });
}
function openSec(btn,id){
  const wrap = document.getElementById('view-ciudad');
  wrap.querySelectorAll('.secnav button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  wrap.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  const sec = document.getElementById(id);
  sec.classList.add('on');
  const mapEl = sec.querySelector('.map-wrap');
  if(mapEl) ensureMap(mapEl.id.replace('lmap-',''));
}

function hoyKey(){
  const n = new Date();
  if(n.getFullYear()!==2026) return null;
  return String(n.getMonth()+1).padStart(2,'0') + String(n.getDate()).padStart(2,'0');
}
function allItems(){ 
  const custom = store.get(KEY_CUSTOM) || {};
  return DIAS.flatMap(d=>[...d.items, ...(custom[d.k]||[])]);
}
function renderTareas(){
  const done = store.get(KEY_DONE) || {};
  const custom = store.get(KEY_CUSTOM) || {};
  const items = allItems();
  const nDone = items.filter(i=>done[i.id]).length;
  const hk = hoyKey();
  document.getElementById('view-tareas').innerHTML = `
    <div class="card" style="border-left:6px solid var(--deep)">
      <h2 style="font-size:20px">Tareas del viaje</h2>
      <p class="muted small" style="margin:4px 0 8px">${nDone}/${items.length} completadas. Se guardan en este móvil ✓</p>
      <div class="progressbar"><i style="width:${items.length?Math.round(nDone/items.length*100):0}%"></i></div>
    </div>
    ${DIAS.map(d=>{
      const extra = custom[d.k]||[];
      const today = d.k===hk;
      return `
      <div class="day-card ${today?'today':''}">
        <div class="dh"><h3>${d.f}</h3>${today?'<span class="today-tag">HOY</span>':''}<span class="where" style="background:${d.wc}">${d.w}</span></div>
        ${[...d.items, ...extra].map(it=>`
          <label class="todo ${done[it.id]?'done':''} ${it.ci?'checkin':''}">
            <input type="checkbox" ${done[it.id]?'checked':''} onchange="toggleTodo('${it.id}')">
            <span class="tx">${it.ci?'✈️ ':''}${it.t}${it.c?`<span class="ck">${it.c}</span>`:''}</span>
            ${it.custom?`<button class="del" onclick="delTodo(event,'${d.k}','${it.id}')" aria-label="Borrar">✕</button>`:''}
          </label>`).join('')}
        <div class="addrow">
          <input id="add-${d.k}" placeholder="Añadir tarea…" onkeydown="if(event.key==='Enter')addTodo('${d.k}')">
          <button onclick="addTodo('${d.k}')" aria-label="Añadir">+</button>
        </div>
      </div>`;
    }).join('')}
  `;
}
function toggleTodo(id){
  const done = store.get(KEY_DONE) || {};
  done[id] = !done[id];
  store.set(KEY_DONE, done);
  renderTareas();
}
function addTodo(dk){
  const inp = document.getElementById('add-'+dk);
  const t = (inp.value||'').trim();
  if(!t) return;
  const custom = store.get(KEY_CUSTOM) || {};
  (custom[dk] ||= []).push({id:'c-'+Date.now(), t, custom:true});
  store.set(KEY_CUSTOM, custom);
  renderTareas();
}
function delTodo(ev,dk,id){
  ev.preventDefault();
  const custom = store.get(KEY_CUSTOM) || {};
  custom[dk] = (custom[dk]||[]).filter(x=>x.id!==id);
  store.set(KEY_CUSTOM, custom);
  renderTareas();
}
renderTareas();

/* Fotos: imagen principal del artículo de Wikipedia (licencia libre), resuelta en runtime.
   Si no hay red o falla, queda el fondo degradado de la ciudad — nunca se ve roto. */
const WIKI_CACHE = {};
async function wikiImg(title, lang){
  const key = lang+':'+title;
  if(WIKI_CACHE[key] !== undefined) return WIKI_CACHE[key];
  try{
    const r = await fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
    if(!r.ok) throw 0;
    const j = await r.json();
    let u = null;
    if(j.originalimage && j.originalimage.width <= 3200) u = j.originalimage.source;
    else if(j.thumbnail) u = j.thumbnail.source;
    else if(j.originalimage) u = j.originalimage.source;
    WIKI_CACHE[key] = u || null;
    return WIKI_CACHE[key];
  }catch(e){ WIKI_CACHE[key] = null; return null; }
}

      <div class="em">${c.em}</div>
      <h4>Y la historia continúa con vosotros</h4>
      <p>${c.fechas} · ahora id a pisarla.</p>
      <button onclick="closeStory()">Volver a la guía ›</button>
    </div>`;

  s.classList.add('on');
  document.body.style.overflow='hidden';
  flow.scrollTop = 0;

  /* revelado progresivo + contadores */
  if(stIO) stIO.disconnect();
  stIO = new IntersectionObserver(ens=>{
    ens.forEach(en=>{
      if(!en.isIntersecting) return;
      en.target.classList.add('in');
      stIO.unobserve(en.target);
      const num = en.target.matches('.stat') ? en.target.querySelector('.n') : null;
      if(num && !num.dataset.done){
        num.dataset.done=1;
        const target=+num.dataset.n, t0=performance.now(), dur=1400;
        (function tick(t){
          const p=Math.min((t-t0)/dur,1), ease=1-Math.pow(1-p,3);
          num.textContent=Math.round(target*ease).toLocaleString('es');
          if(p<1) requestAnimationFrame(tick);
        })(t0);
      }
      /* carga perezosa de foto justo cuando su tarjeta entra */
      if(en.target.matches('figure.pcard') && !en.target.dataset.ld){
        en.target.dataset.ld=1;
        loadPhoto(en.target);
      }
    });
  },{root:flow, threshold:.18, rootMargin:'0px 0px -6% 0px'});
  wrap.querySelectorAll('.rv').forEach(el=>stIO.observe(el));

  /* año fijo arriba + pip encendido + vibración por era */
  if(stIO2) stIO2.disconnect();
  const cy = s.querySelector('.cy');
  stIO2 = new IntersectionObserver(ens=>{
    ens.forEach(en=>{
      if(!en.isIntersecting) return;
      en.target.classList.add('in');
      const y = en.target.dataset.y;
      if(cy.textContent!==y){
        cy.classList.add('sw');
        setTimeout(()=>{cy.textContent=y; cy.classList.remove('sw');},180);
        if(navigator.vibrate) navigator.vibrate(5);
      }
    });
  },{root:flow, threshold:0, rootMargin:'-38% 0px -52% 0px'});
  wrap.querySelectorAll('.era').forEach(el=>stIO2.observe(el));

  /* barra de progreso */
  flow.onscroll = ()=>{
    const p = flow.scrollTop/(flow.scrollHeight-flow.clientHeight);
    s.querySelector('.pbar').style.width = (p*100).toFixed(1)+'%';
  };
}
async function loadPhoto(fig){
  const u = await wikiImg(fig.dataset.w, fig.dataset.lang);
  if(!u){ fig.remove(); return; }
  const im = new Image();
  im.onload = ()=>{
    const sk = fig.querySelector('.skel');
    im.classList.add('ld');
    fig.insertBefore(im, sk);
    sk.remove();
  };
  im.onerror = ()=>fig.remove();
  im.src = u;
}
function closeStory(){
  document.getElementById('story').classList.remove('on');
  if(stIO) stIO.disconnect();
  if(stIO2) stIO2.disconnect();
  document.body.style.overflow='';
}
document.addEventListener('keydown', e=>{
  const s=document.getElementById('story');
  if(!s.classList.contains('on')) return;
  const f=s.querySelector('.flow');
  if(e.key==='Escape') closeStory();
  if(e.key==='ArrowDown') f.scrollBy({top:f.clientHeight*.7,behavior:'smooth'});
  if(e.key==='ArrowUp') f.scrollBy({top:-f.clientHeight*.7,behavior:'smooth'});
});

/* ================= CALCULADORA (pantalla de inicio) ================= */
let CV = 50000;
function getRate(){ return store.get('co-rate') || 3700; }
const fmt = n => Math.round(n).toLocaleString('es');
const parseNum = s => { const n = parseFloat(String(s).replace(/\./g,'').replace(',','.')); return isFinite(n)?n:0; };

document.getElementById('view-cambio').innerHTML = `
  <div class="calc">
    <div class="disp">
      <div class="lab">Pesos colombianos</div>
      <div class="field">
        <input class="big" id="i-cop" inputmode="numeric" placeholder="0" oninput="fromCop(this.value)">
        <span class="cur2">COP</span>
      </div>
      <div class="sep"></div>
      <div class="lab">Euros</div>
      <div class="field e">
        <input class="big eur" id="i-eur" inputmode="decimal" placeholder="0" oninput="fromEur(this.value)">
        <span class="cur2">EUR</span>
      </div>
      <div class="edith">✏️ Escribe en cualquiera de los dos · o toca un billete para sumar</div>
    </div>
    <div class="qgrid">
      ${[5000,10000,20000,50000,100000,200000].map(v=>`<button onclick="addCop(${v})"><span class="p">+</span>${v/1000}K</button>`).join('')}
    </div>
    <div class="calcbar">
      <button class="reset" onclick="resetCalc()">↺ Reset</button>
      <span class="rt">1 € =<input id="rate" inputmode="numeric" onchange="setRate()"></span>
    </div>
  </div>
`;

function paintCalc(focus){
  const r = getRate();
  const cop = document.getElementById('i-cop');
  const eur = document.getElementById('i-eur');
  if(focus!=='cop') cop.value = CV ? fmt(CV) : '';
  if(focus!=='eur') eur.value = CV ? (CV/r).toLocaleString('es',{minimumFractionDigits:2,maximumFractionDigits:2}) : '';
  const ri = document.getElementById('rate'); if(ri && document.activeElement!==ri) ri.value = r;
}
function fromCop(v){ CV = parseNum(v); paintCalc('cop'); }
function fromEur(v){ CV = Math.round(parseNum(v)*getRate()); paintCalc('eur'); }
function addCop(v){ CV += v; if(navigator.vibrate) navigator.vibrate(6); paintCalc(); }
function resetCalc(){ CV = 0; if(navigator.vibrate) navigator.vibrate(10); paintCalc(); }
function setRate(){
  const v = parseNum(document.getElementById('rate').value);
  if(v>0) store.set('co-rate', v);
  paintCalc();
}
paintCalc();

/* ================= NAVEGACIÓN (con botón atrás del móvil) ================= */
function go(v, id){
  const hash = v==='ciudad' ? '#ciudad-'+id : '#'+v;
  if(location.hash !== hash){ location.hash = hash; return; } /* hashchange renderiza */
  render(v, id);
}
function render(v, id){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  document.getElementById('view-'+v).classList.add('on');
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('on'));
  const tb = document.getElementById('tab-'+(v==='ciudad'?'ciudades':v)); if(tb) tb.classList.add('on');
  const m = document.querySelector('main'); if(m) m.scrollTop = 0;
}
function route(){
  const hsh = location.hash || '#cambio';
  if(hsh.startsWith('#ciudad-')){ buildCity(hsh.slice(8)); render('ciudad'); }
  else{
    const v = hsh.slice(1);
    render(['cambio','itinerario','ciudades','tareas','practico'].includes(v) ? v : 'cambio');
  }
}
window.addEventListener('hashchange', route);
route();

/* Offline */
if('serviceWorker' in navigator){
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{
    if(refreshing) return; refreshing = true; location.reload();
  });
  navigator.serviceWorker.register('sw.js').then(reg=>{ reg.update(); }).catch(()=>{});
}
</script>
