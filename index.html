<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Colombia · Carlos & Adriana</title>
<meta name="description" content="Guía de viaje Colombia 21 jul – 4 ago 2026">
<meta name="theme-color" content="#10393B">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Colombia">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --ink:#17302E; --ink-soft:#4A615E; --paper:#FBFAF4; --card:#FFFFFF;
  --line:#E4E0D2; --deep:#10393B;
  --ctg:#E2574C; --sal:#3E8E5A; --med:#C94F7C; --adz:#1699A3; --bog:#C99527;
  --radius:16px; --nav-h:56px;
  --stripe:linear-gradient(90deg,#0E7C86 0%,#12A5A0 18%,#35C4B5 36%,#7FD8C9 52%,#B8E8DB 66%,#E2574C 82%,#C99527 100%);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
html{height:100%;background:var(--deep)}
body{
  font-family:'Karla',system-ui,sans-serif;background:var(--deep);color:var(--ink);
  font-size:16px;line-height:1.55;
  position:fixed;top:0;right:0;bottom:0;left:0;
  display:flex;flex-direction:column;overflow:hidden;overscroll-behavior:none;
}
h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;line-height:1.15}
.stripe{height:5px;background:var(--stripe);border-radius:3px}

/* ---------- Header ---------- */
header.app{
  background:var(--deep);color:#F2EFE4;padding:calc(12px + env(safe-area-inset-top)) 18px 13px;
  flex:none;z-index:40;
}
header.app .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;opacity:.75;font-weight:700}
header.app h1{font-size:23px;font-weight:900;margin:2px 0 7px}
header.app h1 em{font-style:italic;color:#7FD8C9}
header.app .stripe{opacity:.95}

/* ---------- Layout ---------- */
main{flex:1;min-height:0;background:var(--paper);overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding:16px 16px 24px;width:100%;max-width:640px;margin:0 auto}
.view{display:none;animation:fade .25s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- Bottom nav ---------- */
nav.tabs{
  flex:none;z-index:50;position:relative;
  height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  background:var(--deep);display:flex;align-items:stretch;
}
nav.tabs::after{content:"";position:absolute;top:100%;left:0;right:0;height:200px;background:var(--deep)}
nav.tabs button{
  flex:1;background:none;border:none;font-family:'Karla',sans-serif;font-size:10.5px;font-weight:700;
  color:rgba(242,239,228,.62);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:3px;
  padding:0 2px calc(env(safe-area-inset-bottom) + 4px);cursor:pointer;position:relative;transition:color .2s ease;
}
nav.tabs button .ico{font-size:19px;line-height:1;transition:transform .2s ease}
nav.tabs button.on{color:#7FD8C9}
nav.tabs button.on::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:28px;height:3px;border-radius:0 0 3px 3px;background:#7FD8C9}
nav.tabs button.on .ico{transform:scale(1.12)}

/* ---------- Cards & chips ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.chip{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;color:#fff}
.muted{color:var(--ink-soft);font-size:14px}
.small{font-size:13px}

/* ---------- Timeline (itinerario) ---------- */
.tl{position:relative;padding-left:26px}
.tl::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:3px;border-radius:2px;background:var(--stripe)}
.tl-item{position:relative;margin-bottom:16px}
.tl-item::before{
  content:"";position:absolute;left:-24px;top:8px;width:13px;height:13px;border-radius:50%;
  background:var(--dot,#888);border:3px solid var(--paper);box-shadow:0 0 0 2px var(--dot,#888);
}
.tl-item .dates{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dot,#666)}
.tl-item h3{font-size:20px;margin:1px 0 3px}
.flight{
  background:#F1F6F2;border:1px dashed #BFD3C5;border-radius:12px;padding:10px 12px;margin:10px 0;
  font-size:13.5px;
}
.flight b{font-family:'Fraunces',serif;font-size:15px}
.flight .code{font-weight:700;letter-spacing:.04em}

/* ---------- City cards grid ---------- */
.city-card{
  display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;
  background:var(--card);border:1px solid var(--line);border-left:6px solid var(--c,#999);
  border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;font-family:inherit;color:inherit;
}
.city-card .em{font-size:28px}
.city-card h3{font-size:19px}
.city-card .muted{margin-top:1px}
.city-card .arrow{margin-left:auto;color:var(--c,#999);font-size:20px;font-weight:700}

/* ---------- City page ---------- */
.city-head{border-radius:var(--radius);padding:20px 18px;color:#fff;margin-bottom:14px;background:var(--c,#333)}
.city-head .back{background:rgba(255,255,255,.22);border:none;color:#fff;font-weight:700;font-size:13px;
  padding:6px 12px;border-radius:999px;cursor:pointer;margin-bottom:10px;font-family:inherit}
.city-head h2{font-size:30px;font-weight:900}
.city-head .dates{font-size:13px;font-weight:700;opacity:.92;margin-top:2px}
.secnav{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.secnav::-webkit-scrollbar{display:none}
.secnav button{
  flex:0 0 auto;border:1.5px solid var(--c,#999);color:var(--c,#333);background:transparent;
  font-family:inherit;font-weight:700;font-size:13px;padding:6px 13px;border-radius:999px;cursor:pointer;
}
.secnav button.on{background:var(--c,#333);color:#fff}
.sec{display:none}
.sec.on{display:block;animation:fade .2s ease}
.sec h3{font-size:17px;margin:16px 0 6px;display:flex;align-items:center;gap:8px}
.sec h3::before{content:"";width:14px;height:5px;border-radius:3px;background:var(--c,#333);display:inline-block}
.sec p{margin-bottom:10px}
.sec ul{padding-left:0;list-style:none}
.sec li{padding:8px 0 8px 0;border-bottom:1px solid var(--line)}
.sec li:last-child{border-bottom:none}
.sec li b{display:block}
.sec li .muted{display:block;margin-top:1px}
.tag{display:inline-block;font-size:11px;font-weight:700;border-radius:6px;padding:1px 7px;margin-left:6px;vertical-align:2px}
.tag.eco{background:#E4F2E7;color:#2C6E44}
.tag.mid{background:#FBEEDB;color:#9A6415}
.tag.top{background:#F6E3EC;color:#A03568}
.note{
  border-radius:12px;padding:12px 14px;margin:12px 0;font-size:14px;
  background:#FFF6E3;border:1px solid #ECD9A6;
}
.note.alert{background:#FDEBE8;border-color:#EFC0B8}
.note b{font-family:'Fraunces',serif}
.dayplan{border-left:3px solid var(--c,#999);padding:2px 0 2px 12px;margin:12px 0}
.dayplan .d{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--c,#666)}

/* ---------- Práctico ---------- */
.pract h2{font-size:22px;margin:6px 0 12px}
details{border:1px solid var(--line);border-radius:var(--radius);background:var(--card);margin-bottom:10px;overflow:hidden}
summary{list-style:none;cursor:pointer;padding:14px 16px;font-weight:700;font-family:'Fraunces',serif;font-size:16.5px;display:flex;align-items:center;gap:10px}
summary::-webkit-details-marker{display:none}
summary .em{font-size:19px}
summary::after{content:"+";margin-left:auto;font-size:20px;color:var(--ink-soft);font-family:'Karla',sans-serif}
details[open] summary::after{content:"–"}
details .bd{padding:0 16px 14px;font-size:14.5px}
details .bd ul{padding-left:18px;margin:6px 0}
details .bd li{margin-bottom:5px}

/* ---------- Tareas ---------- */
.day-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.day-card.today{border:2px solid var(--adz);box-shadow:0 2px 14px rgba(22,153,163,.18)}
.day-card .dh{padding:12px 16px 8px;display:flex;align-items:baseline;gap:8px}
.day-card .dh h3{font-size:16.5px}
.day-card .dh .where{margin-left:auto;font-size:12px;font-weight:700;color:#fff;border-radius:999px;padding:2px 10px}
.day-card .dh .today-tag{font-size:11px;font-weight:700;color:var(--adz)}
.todo{display:flex;align-items:flex-start;gap:11px;padding:10px 16px;border-top:1px solid var(--line);cursor:pointer;user-select:none}
.todo input{margin-top:3px;width:19px;height:19px;accent-color:var(--adz);flex:none;cursor:pointer}
.todo .tx{font-size:14.5px}
.todo.done .tx{text-decoration:line-through;color:var(--ink-soft);opacity:.75}
.todo .ck{font-size:12px;color:var(--ink-soft);display:block}
.todo.checkin{background:#F0F8F8}
.addrow{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--line)}
.addrow input{flex:1;border:1px solid var(--line);border-radius:10px;padding:8px 12px;font:inherit;font-size:14px;background:var(--paper)}
.addrow button{border:none;background:var(--deep);color:#fff;font-weight:700;border-radius:10px;padding:0 14px;font-size:18px;cursor:pointer}
.todo .del{margin-left:auto;border:none;background:none;color:#C0574C;font-size:16px;cursor:pointer;padding:0 2px;flex:none}
.progressbar{height:6px;background:#EAE7DA;border-radius:3px;overflow:hidden;margin:8px 0 14px}
.progressbar i{display:block;height:100%;background:var(--stripe);border-radius:3px;transition:width .3s}

/* ---------- Maps links & conversor ---------- */
a.gm{text-decoration:none;font-size:13px;margin-left:6px;vertical-align:1px}
.hotel-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.22);border:none;color:#fff;
  font-weight:700;font-size:13px;padding:6px 12px;border-radius:999px;cursor:pointer;font-family:inherit;text-decoration:none;margin-top:10px}
.conv .row{display:flex;gap:10px;align-items:center;margin:8px 0}
.conv input{flex:1;min-width:0;border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;font:inherit;font-size:17px;font-weight:700;background:var(--paper)}
.conv .eq{font-size:18px;color:var(--ink-soft)}
.conv .cur{font-weight:700;font-size:14px;color:var(--ink-soft);width:38px;flex:none}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chips button{border:1.5px solid var(--deep);color:var(--deep);background:transparent;font-family:inherit;font-weight:700;
  font-size:13px;padding:6px 12px;border-radius:999px;cursor:pointer}
.rate-row{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:13px;color:var(--ink-soft)}
.rate-row input{width:76px;border:1px solid var(--line);border-radius:8px;padding:4px 8px;font:inherit;font-size:14px;text-align:center;background:var(--paper)}

/* ---------- Calculadora ---------- */
.calc{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:14px 12px 12px}
.calc .disp{background:linear-gradient(155deg,#10393B,#0A2426);border-radius:18px;padding:13px 16px 12px;color:#F2EFE4;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
.calc .lab{font-size:10.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;opacity:.62}
.calc .big{font-family:'Fraunces',serif;font-weight:900;font-size:clamp(32px,10vw,50px);line-height:1.08;
  letter-spacing:-.025em;background:none;border:none;color:#F2EFE4;width:100%;padding:2px 0;
  caret-color:#7FD8C9;min-width:0}
.calc .big::placeholder{color:rgba(242,239,228,.3)}
.calc .big.eur{color:#7FD8C9}
.calc .big:focus{outline:none}
.calc .field{display:flex;align-items:baseline;gap:9px}
.calc .field .cur2{font-size:16px;opacity:.6;font-weight:700;flex:none}
.calc .field.e .cur2{color:#7FD8C9;opacity:.75}
.calc .sep{height:1px;background:rgba(255,255,255,.14);margin:10px 0}
.calc .edith{font-size:11px;opacity:.5;margin-top:9px;text-align:center;line-height:1.4}

.qgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.qgrid button{border:1.5px solid #CFE4D6;background:linear-gradient(180deg,#F1F9F3,#E4F1E8);color:#1E6B48;
  font-family:'Fraunces',serif;font-weight:700;font-size:18px;padding:14px 4px;border-radius:15px;cursor:pointer;
  box-shadow:0 1px 2px rgba(0,0,0,.05);transition:transform .08s ease}
.qgrid button:active{transform:scale(.95);background:#D6EADD}
.qgrid button .p{font-size:13px;opacity:.6;font-weight:700;margin-right:1px}

.calcbar{display:flex;gap:9px;margin-top:11px;align-items:center}
.calcbar button{border:none;font-family:inherit;font-weight:700;font-size:14.5px;padding:13px 18px;
  border-radius:14px;cursor:pointer;transition:transform .08s ease}
.calcbar button:active{transform:scale(.96)}
.calcbar .reset{background:linear-gradient(180deg,#FCEFEC,#F6E1DC);color:#A2453A;box-shadow:inset 0 0 0 1.5px #EFCFC7;flex:none}
.calcbar .rt{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-soft);font-weight:700}
.calcbar .rt input{width:70px;border:1.5px solid var(--line);border-radius:11px;padding:9px 6px;
  font:inherit;font-size:14.5px;font-weight:700;text-align:center;background:var(--paper);color:var(--ink)}

/* ---------- Fun facts ---------- */
.facts .grp{margin:18px 0 4px}
.facts .grp:first-child{margin-top:6px}
.facts .gh{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.facts .gh .pin2{width:30px;height:30px;border-radius:9px;background:var(--c,#333);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:16px;flex:none}
.facts .gh h3{font-size:16px;font-family:'Fraunces',serif;font-weight:700}
.facts .fact{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--c,#333);
  border-radius:14px;padding:13px 15px;margin-bottom:10px}
.facts .fact .ft{font-family:'Fraunces',serif;font-weight:700;font-size:15.5px;margin-bottom:4px;display:flex;gap:8px;align-items:baseline}
.facts .fact .ft .e{font-size:17px;flex:none}
.facts .fact p{font-size:14.5px;line-height:1.6;margin:0;color:var(--ink)}
.facts .intro{font-size:14px;color:var(--ink-soft);margin-bottom:6px}

/* ---------- Lectura larga ---------- */
.longread{font-size:16.5px;line-height:1.72}
.longread h3{font-size:19px;margin:26px 0 8px}
.longread h3:first-child{margin-top:8px}
.longread p{margin-bottom:13px}
.longread .lead{font-size:18px;line-height:1.6;font-family:'Fraunces',serif;font-weight:500;
  border-left:4px solid var(--c,#333);padding-left:14px;margin-bottom:18px}
.longread blockquote{margin:16px 0;padding:14px 16px;background:#F5F2E6;border-radius:0 14px 14px 0;
  border-left:4px solid var(--c,#333);font-family:'Fraunces',serif;font-size:16.5px;line-height:1.5}
.longread .rtime{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;
  color:var(--ink-soft);background:var(--paper);border:1px solid var(--line);padding:5px 12px;border-radius:999px;margin-bottom:14px}
.longread ul{margin:4px 0 14px;padding-left:0}
.longread li{border-bottom:none;padding:5px 0 5px 20px;position:relative}
.longread li::before{content:"›";position:absolute;left:6px;color:var(--c,#333);font-weight:700}
.longread .barrio{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--c,#333);
  border-radius:14px;padding:14px 16px;margin:14px 0}
.longread .barrio h4{font-size:17px;font-family:'Fraunces',serif;margin-bottom:5px}
.longread .barrio .meta{font-size:12px;font-weight:700;color:var(--c,#333);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}

/* ---------- Mapa por ciudad ---------- */
.map-wrap{height:62vh;min-height:380px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line)}
.map-legend{display:flex;gap:14px;margin:10px 2px 0;font-size:12.5px;color:var(--ink-soft);font-weight:700}
.pin{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50% 50% 50% 8px;
  transform:rotate(0deg);font-size:17px;box-shadow:0 3px 8px rgba(0,0,0,.35);border:2.5px solid #fff}
.leaflet-popup-content{font-family:'Karla',sans-serif;font-size:13.5px;margin:10px 14px}
.leaflet-popup-content b{font-family:'Fraunces',serif;font-size:15px}
.leaflet-popup-content a{color:#0E7C86;font-weight:700;text-decoration:none}

/* ---------- Stats y datos en historias ---------- */
#story .stat{display:flex;align-items:baseline;gap:8px;margin:12px 0 2px;
  opacity:0;transform:translateY(16px);transition:all .5s ease .45s}
#story .mo.vis .stat{opacity:1;transform:none}
#story .stat .n{font-family:'Fraunces',serif;font-weight:900;font-size:44px;color:#FFD98E;text-shadow:0 2px 14px rgba(0,0,0,.4)}
#story .stat .u{font-size:15px;font-weight:700;opacity:.9;max-width:180px;line-height:1.2}
#story .dato{margin-top:14px;opacity:0;transition:opacity .5s ease .55s}
#story .mo.vis .dato{opacity:1}
#story .dato > button{border:1.5px solid rgba(255,255,255,.55);background:rgba(0,0,0,.25);color:#fff;
  font-family:inherit;font-weight:700;font-size:13px;padding:7px 14px;border-radius:999px;cursor:pointer;backdrop-filter:blur(4px)}
#story .dato .dx{display:none;margin-top:10px;font-size:14.5px;line-height:1.5;background:rgba(0,0,0,.35);
  border-left:3px solid #FFD98E;padding:10px 12px;border-radius:0 10px 10px 0;backdrop-filter:blur(4px)}
#story .dato.open .dx{display:block;animation:fade .3s ease}
#story .dato.open > button{display:none}

/* ---------- Modo historia: relato continuo ---------- */
.story-btn{display:flex;align-items:center;gap:10px;width:100%;border:none;cursor:pointer;font-family:inherit;
  background:linear-gradient(100deg,var(--c,#333),color-mix(in srgb,var(--c,#333) 55%,#10393B));
  color:#fff;border-radius:14px;padding:14px 16px;margin:4px 0 14px;text-align:left}
.story-btn .big{font-family:'Fraunces',serif;font-weight:700;font-size:16px}
.story-btn .sub{font-size:12px;opacity:.85}
.story-btn .play{margin-left:auto;font-size:22px}

#story{position:fixed;inset:0;z-index:100;display:none;color:#F4F1E8;background:#0C2224}
#story.on{display:block}
#story::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.55;
  background:radial-gradient(60% 40% at 15% 8%, color-mix(in srgb,var(--sc,#333) 55%, transparent), transparent 70%),
             radial-gradient(50% 35% at 90% 55%, color-mix(in srgb,var(--sc,#333) 35%, transparent), transparent 70%),
             radial-gradient(55% 40% at 20% 95%, color-mix(in srgb,var(--sc,#333) 45%, transparent), transparent 70%);
  animation:aurora 16s ease-in-out infinite alternate}
@keyframes aurora{from{filter:hue-rotate(0deg);transform:translateY(0)}to{filter:hue-rotate(14deg);transform:translateY(-2.5%)}}

/* barra superior fija: año actual + progreso */
#story .top{position:absolute;top:0;left:0;right:0;z-index:8;padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(180deg, rgba(10,28,30,.92), rgba(10,28,30,.6) 70%, transparent);pointer-events:none}
#story .top .cy{font-family:'Fraunces',serif;font-weight:900;font-size:26px;color:#FFD98E;min-width:86px;
  transition:opacity .25s ease}
#story .top .cy.sw{opacity:0}
#story .top .ct2{font-size:12px;font-weight:700;opacity:.8;letter-spacing:.06em;text-transform:uppercase}
#story .pbar{position:absolute;left:0;top:0;height:3px;background:linear-gradient(90deg,#FFD98E,var(--sc,#fff));width:0%;z-index:9}
#story .close{position:absolute;top:calc(16px + env(safe-area-inset-top));right:12px;z-index:10;border:none;
  background:rgba(0,0,0,.45);color:#fff;font-size:16px;width:36px;height:36px;border-radius:50%;cursor:pointer}

#story .flow{position:relative;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;overscroll-behavior:contain}

sal:`<span class="rtime">📖 Lectura de ~20 min</span>
<p class="lead">El Eje Cafetero no es un paisaje: es una forma de vivir que se inventó hace siglo y medio a golpe de machete, y que sigue funcionando. Salento es el pueblo donde mejor se ve, y el Valle de Cocora es lo que pasa cuando la naturaleza decide superar a cualquier arquitecto.</p>

<h3>La colonización antioqueña: cómo se pobló esta montaña</h3>
<p>A mediados del siglo XIX, Antioquia (la región de Medellín) tenía un problema: demasiada gente y muy poca tierra buena. Empezó entonces una migración lenta hacia el sur, familia a familia, mula a mula, abriendo camino con machete por una cordillera cubierta de selva. No fue una colonización organizada por el Estado sino una expansión campesina espontánea que en pocas décadas fundó decenas de pueblos: Salento (1842), Filandia, Circasia, Manizales, Pereira, Armenia.</p>
<p>Aquellos colonos traían un modelo cultural muy definido: familias enormes y católicas, propiedad pequeña trabajada por sus dueños, arquitectura de <strong>bahareque</strong> (una estructura de guadua —el bambú andino— rellena de barro y estiércol, ligera, barata y sorprendentemente antisísmica) y una ética del trabajo casi obsesiva. La palabra que resume todo eso es <em>"berraquera"</em>: tesón, empuje, no rendirse.</p>
<p>Ese modelo explica lo que veréis. Los pueblos del Eje Cafetero tienen todos la misma estructura —plaza con iglesia, calles en cuadrícula, casas de un piso con zócalo pintado, puertas y ventanas de colores intensos— porque son hijos de la misma migración. Y los colores no son turismo: pintar la casa con lo que sobraba de otras pinturas era una costumbre práctica que se volvió identidad.</p>
<p>Salento tiene además el mérito de ser el más antiguo del Quindío y de haber estado en la ruta del <em>Camino Nacional</em>, la vía que Simón Bolívar mandó construir para conectar Bogotá con el occidente. Todavía se pueden caminar tramos empedrados de aquella ruta.</p>

<h3>El café: por qué aquí y por qué importa tanto</h3>
<p>El café llegó a esta zona a finales del XIX y encontró el sitio perfecto: altitud entre 1.200 y 2.000 metros, temperaturas estables de 18-22 °C, lluvias repartidas, suelo volcánico rico y sombra de montaña. Esa combinación produce un grano de maduración lenta, más denso y más aromático: lo que en el mundo se conoce como <em>café suave lavado</em>, la especialidad colombiana.</p>
<p>Pero lo que hizo grande al café colombiano no fue solo la geografía: fue la organización. En 1927 se creó la <strong>Federación Nacional de Cafeteros</strong>, una entidad de los propios productores que fija precios de garantía, financia investigación (el centro Cenicafé desarrolla variedades resistentes a plagas) y construyó carreteras, escuelas y hospitales en zonas donde el Estado no llegaba. En 1958 inventaron a <strong>Juan Valdez</strong>, el cafetero de sombrero y mula, para diferenciar el café colombiano en Estados Unidos. Funcionó tan bien que hoy es una de las marcas de origen más reconocidas del planeta.</p>
<p>La estructura sigue siendo de minifundio: más de 500.000 familias cafeteras, la mayoría con fincas de menos de dos hectáreas. Por eso el tour del café aquí no es una visita a una industria, sino a una casa. Y por eso se recoge a mano, grano a grano, solo los rojos: la <em>recolección selectiva</em> que explica buena parte de la calidad.</p>

<h3>Qué vais a ver realmente en un tour de café</h3>
<p>Merece la pena saber de antemano el proceso, porque así el tour deja de ser una caminata bonita y se vuelve fascinante:</p>
<ul>
<li><strong>El cafeto</strong>: un arbusto que da flores blancas con olor a jazmín y, meses después, cerezas que pasan de verde a rojo intenso. Cada cereza tiene dos granos.</li>
<li><strong>Recolección</strong>: a mano, solo las rojas. Un buen recolector llena un canasto con 50-60 kg al día y cobra por kilo. Es un trabajo durísimo, y hoy hay escasez de recolectores.</li>
<li><strong>Despulpado</strong>: se retira la piel y queda el grano cubierto de un mucílago dulce y pegajoso.</li>
<li><strong>Fermentación</strong>: 12-24 horas en tanques. Aquí se juega buena parte del sabor final; las fincas de especialidad experimentan con fermentaciones largas, anaeróbicas o con levaduras.</li>
<li><strong>Lavado y secado</strong>: al sol en marquesinas o en secadores. Hasta que el grano queda con un 11% de humedad.</li>
<li><strong>Trilla y tueste</strong>: se quita el pergamino y se tuesta. Y aquí el dato incómodo: durante décadas el mejor café se exportaba entero y en Colombia se bebía lo que sobraba, tostado casi negro y con azúcar. Eso ha cambiado radicalmente en los últimos quince años con la revolución del café de especialidad.</li>
</ul>
<p>En la <strong>cata</strong> final os enseñarán a sorber ruidosamente (para airear el café y repartirlo por la lengua) y a identificar acidez, cuerpo y notas. Los cafés de esta zona suelen tener acidez cítrica, cuerpo medio y notas a caramelo, panela y frutas rojas.</p>
<blockquote>Vocabulario esencial: un "tinto" es un café negro pequeño, y os lo ofrecerán todo el día. Un "perico" o "pintadito" lleva un poco de leche. Si pedís "café con leche" os traerán un vaso grande de leche caliente con un chorrito de café.</blockquote>

<h3>El Valle de Cocora y las palmas imposibles</h3>
<p>A 11 kilómetros de Salento, la carretera termina en un valle verde flanqueado por montañas, y de la hierba salen unas columnas de treinta, cuarenta, sesenta metros rematadas por un penacho de hojas. Son <strong>palmas de cera del Quindío</strong> (Ceroxylon quindiuense), la palmera más alta del mundo y el árbol nacional de Colombia.</p>
<p>Lo extraordinario no es solo su altura, sino que crecen a 2.500 metros de altitud, en un clima frío y de niebla donde ninguna palmera debería sobrevivir. Su tronco está cubierto de una capa de cera que durante el siglo XIX se explotó para fabricar velas y jabón: se talaba el árbol entero para raspar la cera. Eso, sumado a la costumbre de cortar las hojas para el Domingo de Ramos, casi las extinguió. En 1985 fueron declaradas árbol nacional y protegidas por ley.</p>
<p>Hoy hay otro problema, más silencioso: la mayoría de las palmas que veréis son adultas y viejas —pueden vivir 150-200 años— y los brotes jóvenes no prosperan porque el ganado se los come. Muchos de los ejemplares que fotografiaréis llevan ahí desde antes de que existiera Colombia como país.</p>
<p><strong>Cómo hacerlo:</strong> hay dos versiones. La <em>caminata completa</em> (unos 12 km, 5-6 horas) recorre un circuito que sube por el bosque de niebla, cruza seis puentes colgantes sobre el río Quindío, pasa por la Casa de los Colibríes —donde por unos pesos sirven agua de panela con queso y se ven colibríes a un palmo— y baja por el mirador entre las palmas. La versión corta va directa al mirador (1,5-2 h ida y vuelta). Si tenéis tiempo y piernas, haced la completa <em>en sentido antihorario</em>: se sube por el bosque cuando aún hace fresco y se termina bajando entre las palmas con la mejor luz.</p>
<p>Consejos prácticos: botas o zapatillas que se puedan embarrar (el barro es parte del plan), chubasquero siempre, agua, y salir temprano —los Willys empiezan a las 6:30 desde la plaza y la niebla suele entrar a partir de mediodía. Se paga una pequeña entrada al acceder a las fincas privadas del recorrido.</p>

<h3>Los Willys, el yipao y una cultura sobre ruedas</h3>
<p>Después de la Segunda Guerra Mundial, Estados Unidos vendió a precio de saldo miles de jeeps Willys. En una región de montaña sin carreteras asfaltadas fueron una revolución: podían subir donde no llegaba nada más, cargados hasta lo imposible. Se convirtieron en el transporte del café y, con el tiempo, en un símbolo cultural.</p>
<p>El <strong>"yipao"</strong> es la unidad de medida: lo que cabe en un Willys. Y cabe muchísimo —hasta una tonelada—: plátanos, sacos de café, muebles, una familia entera, gallinas, un colchón. En las ferias de la zona se celebran concursos de yipao donde gana quien más carga lleve y quien consiga conducirlo con las ruedas delanteras en el aire.</p>
<p>En la plaza de Salento salen a diario hacia Cocora y las fincas. Se paga en efectivo, unos 6.000 pesos por trayecto, y si va lleno se viaja de pie en el estribo trasero agarrado a la barra. Es incómodo, es ruidoso y es una de las mejores cosas que haréis en el viaje.</p>

<h3>Salento y sus alrededores, punto por punto</h3>
<div class="barrio"><div class="meta">El pueblo</div><h4>Calle Real y la plaza</h4>
<p>La Carrera 6, conocida como Calle Real, sube desde la plaza de Bolívar entre casas de colores convertidas en tiendas de artesanía, cafés y restaurantes, hasta las escaleras del <strong>mirador Alto de la Cruz</strong> (unos 200 escalones). Desde arriba se ve el valle del río Quindío y, en días claros, los nevados. Id al atardecer.</p>
<p>La plaza es el centro de todo: de ahí salen los Willys, ahí está vuestro hotel, y ahí se sienta la gente del pueblo por la tarde. Salento tiene unos 7.000 habitantes y recibe muchísimo turismo; en julio (temporada alta colombiana) estará lleno. Para verlo tranquilo, salid a la calle antes de las ocho de la mañana: es otro pueblo.</p></div>

<div class="barrio"><div class="meta">A 40 minutos</div><h4>Filandia</h4>
<p>El pueblo hermano, igual de bonito y bastante menos saturado. Su plaza es probablemente más armoniosa que la de Salento, y tiene el <strong>Mirador Colina Iluminada</strong>, una torre de madera desde la que se ven tres departamentos. Aquí se rodó la serie <em>Café con aroma de mujer</em>. Es también un centro de cestería en bejuco. Se llega en bus o Willys desde Salento en unos 40 minutos.</p></div>

<div class="barrio"><div class="meta">Si sobra tiempo</div><h4>Otras opciones de la zona</h4>
<p><strong>Termales de Santa Rosa de Cabal</strong> (a ~1,5 h): aguas termales al pie de una cascada, ideal si las piernas quedan destrozadas tras Cocora. <strong>Recuca</strong>: una finca-museo donde se hace el recorrido del café disfrazado de recolector, muy divertido si se va con niños o con ganas de reírse. <strong>Pijao</strong>: pueblo cittaslow, aún menos turístico.</p></div>

<h3>La mesa paisa de montaña</h3>
<p>Aquí cambia todo respecto a la costa: hace fresco, se trabaja duro y la comida es contundente y de tierra adentro.</p>
<p>La estrella local es la <strong>trucha arcoíris</strong>, criada en los ríos fríos de la zona, servida al ajillo, en salsa de champiñones, con maracuyá o simplemente frita, casi siempre acompañada de un <strong>patacón gigante</strong> del tamaño de un plato. La <strong>bandeja paisa</strong> es el plato-monumento: frijoles cargados, arroz, carne molida, chicharrón, chorizo, morcilla, huevo frito, tajadas de plátano maduro, arepa y aguacate. Es comida diseñada para alguien que va a cortar caña doce horas; pedid una para compartir salvo que tengáis hambre real.</p>
<p>Otras cosas que probar: <strong>sancocho</strong> de gallina (sopa espesa de tubérculos), <strong>arepa de chócolo</strong> con quesito (dulce, de maíz tierno), <strong>empanadas</strong> con ají, <strong>chorizo con arepa</strong>, y de postre <strong>brevas con arequipe</strong> o <strong>solteritas</strong>. Para beber: agua de panela con queso (la panela es azúcar de caña sin refinar; el queso se echa dentro y se derrite), <strong>canelazo</strong> si hace frío, y por supuesto café de la finca de al lado.</p>
<p>Y el <strong>aguardiente</strong>: anisado, se bebe en chupitos fríos y cada región tiene el suyo. Aquí, Aguardiente Cristal.</p>

<h3>El tejo: el deporte nacional que explota</h3>
<p>Tenéis que jugarlo. El tejo es un juego de origen indígena muisca que consiste en lanzar un disco de metal de casi un kilo contra una caja de arcilla inclinada, donde hay colocadas unas <strong>mechas</strong>: pequeños sobres de papel con pólvora. Si le das a una, explota. Se juega con cerveza en la mano y se grita mucho.</p>
<p>Es gratis o casi (unos 5.000 pesos por persona) siempre que consumáis bebida, y en Salento el sitio clásico es la cancha Los Amigos. Os explicarán las reglas encantados. Es probablemente la actividad más divertida y más genuinamente colombiana de todo el viaje, y no aparece en ninguna guía de las bonitas.</p>

<h3>Detalles prácticos que importan aquí</h3>
<ul>
<li><strong>Efectivo</strong>: hay pocos cajeros en Salento y a veces se quedan sin billetes. Sacad dinero en Pereira o Armenia antes de subir. Willys, entradas y muchos restaurantes son solo efectivo.</li>
<li><strong>Clima</strong>: 1.900 m de altitud. Mañanas soleadas, tardes de chubasco, noches frescas (12-15 °C). Capas y chubasquero. La lluvia de julio suele ser corta e intensa.</li>
<li><strong>Altitud</strong>: no es Bogotá, pero si venís del nivel del mar de Cartagena, el primer día notaréis algo de falta de aire subiendo cuestas. Normal.</li>
<li><strong>Llegada nocturna</strong>: aterrizáis en Pereira a las 21:54 y Salento está a una hora. Dejadlo cerrado con el hotel; llegar de noche a la plaza de un pueblo dormido tiene su encanto.</li>
</ul>

<p class="lead">Ninguna ciudad del mundo ha cambiado tanto en treinta años como Medellín. Pasó de ser la capital mundial del homicidio a ser un caso de estudio de urbanismo social que se explica en universidades de medio planeta. Entender ese arco es entender por qué los paisas son como son.</p>

<h3>El valle, los paisas y una identidad muy marcada</h3>
<p>Medellín está en el Valle de Aburrá, una hondonada estrecha a 1.500 metros entre dos ramales de la cordillera Central. Ese encierro geográfico produjo dos cosas: un clima constante de unos 22-24 °C todo el año —de ahí lo de "la ciudad de la eterna primavera"— y un aislamiento histórico que forjó una cultura muy propia.</p>
<p>Los antioqueños o <strong>paisas</strong> tienen fama en toda Colombia de trabajadores, comerciantes natos, orgullosos, hospitalarios y algo fanfarrones. Se cuenta que un paisa te vende algo que no necesitas y te deja tan contento que le das las gracias. Hablan con un acento cantarín inconfundible, usan el "vos" en vez del "tú" ("¿vos qué decís, pues?") y rematan las frases con "pues" con una frecuencia que os hará gracia el primer día y os saldrá a vosotros el tercero.</p>
<p>La región se pobló con minería de oro y luego con café —Antioquia fue el motor de la colonización que llenó el Eje Cafetero— y a principios del siglo XX se industrializó con textiles: Coltejer, Fabricato, Everfit. Medellín era "el Manchester colombiano". Esa base industrial explica por qué hoy es la ciudad más emprendedora del país.</p>

<h3>Los años que todo el mundo conoce (y cómo hablar de ellos)</h3>
<p>En los años ochenta el Cartel de Medellín, liderado por Pablo Escobar, convirtió la ciudad en el epicentro del narcotráfico mundial y en el lugar más violento del planeta: en 1991 se registraron 6.349 homicidios, una tasa de 381 por cada 100.000 habitantes. Coches bomba, sicarios en moto, magistrados y periodistas asesinados, un avión derribado en pleno vuelo. Una generación entera creció con eso.</p>
<p>Aquí conviene un apunte de sensibilidad, porque afecta a cómo os van a tratar: <strong>a los medellinenses no les gusta el turismo de Escobar</strong>. Existen tours a su tumba, a su antigua cárcel y a la casa donde murió, y hay quien los hace, pero para mucha gente local es como hacer turismo sobre el asesino de su familia. Series como <em>Narcos</em> son un tema espinoso: convirtieron en icono pop a alguien que aquí es simplemente el hombre que puso bombas en los barrios donde vivían. Si sale el tema en una conversación, escuchad más que hablar. Y si queréis entender esa época en serio, el <strong>Museo Casa de la Memoria</strong> lo cuenta desde el punto de vista de las víctimas, que es infinitamente más interesante.</p>
<p>Escobar murió en 1993, pero la violencia continuó con bandas, milicias guerrilleras urbanas y paramilitares que se disputaron las comunas hasta bien entrados los 2000. La Comuna 13 fue el último gran episodio: en 2002 el Estado lanzó la Operación Orión, una intervención militar con helicópteros sobre un barrio densamente poblado, con un saldo de muertos y desaparecidos que todavía se investiga.</p>

<h3>El milagro: urbanismo social</h3>
<p>Lo que pasó después es lo que hace especial a Medellín. A partir de los años 90, y sobre todo con la alcaldía de Sergio Fajardo (2004-2007), la ciudad aplicó una idea sencilla y radical: <em>llevar la mejor arquitectura, el mejor transporte y los mejores edificios públicos a los barrios más pobres</em>. La frase que lo resume es "lo más bello para los más humildes".</p>
<p>En la práctica significó:</p>
<ul>
<li><strong>El Metro</strong> (1995), el único de Colombia. Limpio, puntual, sin grafitis, sin basura. Existe la "cultura Metro": los paisas lo cuidan como un símbolo de que su ciudad podía ser otra cosa. Nadie come dentro. Nadie raya nada. Lo veréis y no os lo creeréis.</li>
<li><strong>Los Metrocables</strong> (2004): teleféricos integrados al metro que suben a los barrios de ladera. Un trayecto que antes eran dos horas de buses y escaleras pasó a ser quince minutos. No es una atracción turística: es transporte público para vecinos, y por eso funciona.</li>
<li><strong>Bibliotecas-parque</strong>: edificios espectaculares de arquitectos de primera línea colocados deliberadamente en los barrios más golpeados.</li>
<li><strong>Las escaleras eléctricas de la Comuna 13</strong> (2011): 384 metros de escaleras mecánicas al aire libre que salvan el equivalente a un edificio de 28 pisos. Costaron menos que un tramo de autopista.</li>
</ul>
<p>En 2013 el Wall Street Journal, junto con Citi y el Urban Land Institute, la eligió Ciudad Más Innovadora del Mundo por encima de Tel Aviv y Nueva York. Los homicidios bajaron más de un 95% respecto al pico de 1991.</p>
<p>No todo es idílico: la desigualdad sigue siendo enorme, hay barrios donde el control lo ejercen bandas, la gentrificación por el turismo y los nómadas digitales ha disparado los alquileres en El Poblado, y la ciudad sufre episodios graves de contaminación del aire por su geografía de valle cerrado. Pero la transformación es real y la gente está profundamente orgullosa de ella.</p>

<h3>Barrio por barrio</h3>
<div class="barrio"><div class="meta">Vuestra base</div><h4>El Poblado y Provenza</h4>
<p>La ladera este, el barrio rico. Es donde se aloja casi todo el turismo internacional: calles arboladas, edificios altos, cafés de especialidad, restaurantes de todo tipo. <strong>Provenza</strong> es su núcleo de moda —unas pocas manzanas alrededor de la carrera 35 y la calle 8— con terrazas, cócteles y ambiente hasta tarde. El <strong>Parque Lleras</strong>, a un paso, es la zona de fiesta más intensa y también la más problemática: prostitución, drogas y timos a turistas. Se puede pasear, pero no es donde queréis pasar la noche.</p>
<p>El Poblado es cómodo y seguro, pero no es Medellín: es una burbuja. Merece la pena bajar al centro y subir a las comunas para ver la ciudad de verdad.</p></div>

<div class="barrio"><div class="meta">La ciudad real</div><h4>La Candelaria (Centro)</h4>
<p>El casco histórico y el corazón comercial: caótico, ruidoso, lleno de vendedores ambulantes y con una energía tremenda. Aquí están la <strong>Plaza Botero</strong> con sus 23 esculturas monumentales donadas por el propio Fernando Botero (nacido en Medellín en 1932), el <strong>Museo de Antioquia</strong> —uno de los mejores del país, con la mayor colección de Botero—, el <strong>Palacio de la Cultura Rafael Uribe Uribe</strong> con su fachada ajedrezada blanquinegra, y el <strong>Parque Berrío</strong>.</p>
<p>Regla clara: de día, con el móvil guardado y sin joyas, es perfectamente visitable y muy recomendable. De noche, no. Es la zona donde más carteristas hay; llevad poco encima y disfrutadlo sin ansiedad.</p></div>

<div class="barrio"><div class="meta">El símbolo</div><h4>Comuna 13 · San Javier</h4>
<p>Una ladera empinadísima al occidente, poblada por desplazados del conflicto armado que fueron llegando durante décadas y construyendo sus casas ladrillo a ladrillo. Fue el territorio más disputado de la ciudad. Hoy es el gran símbolo de la transformación: escaleras eléctricas, murales que cuentan la historia del barrio, grupos de breakdance y hip-hop, miradores, puestos de mango biche y helado de mango.</p>
<p>Cómo hacerlo bien: id con un <strong>guía local</strong>, del barrio, no con una agencia de fuera. La diferencia es abismal: los guías locales vivieron aquello, os enseñarán las balas todavía incrustadas en las paredes, os explicarán qué significa cada mural y qué pasó en cada esquina. Hay free tours con propina (dad 30-50.000 por persona si os gusta) y tours de pago. Ir por la mañana: por la tarde se llena mucho. Y sí, es seguro; es probablemente el sitio más vigilado de la ciudad.</p></div>

<div class="barrio"><div class="meta">Alternativa con encanto</div><h4>Laureles y Estadio</h4>
<p>Barrio de clase media diseñado en los años cuarenta con calles circulares y muchísimos árboles. Menos turístico que El Poblado, más auténtico, con bares de barrio, La 70 (una avenida llena de sitios donde ver fútbol y bailar), y precios más razonables. Si volvéis alguna vez a Medellín, alojaos aquí.</p></div>

<div class="barrio"><div class="meta">Arriba del todo</div><h4>Santo Domingo y el Parque Arví</h4>
<p>La línea K del metrocable sube desde Acevedo hasta Santo Domingo Savio sobrevolando los tejados de ladrillo de las comunas del nororiente: es la mejor lección de geografía social que se puede recibir en quince minutos. Arriba está la <strong>Biblioteca España</strong> (tres bloques negros icónicos, cerrada desde hace años por problemas constructivos, pero el entorno merece la subida) y el enlace con la línea L, un cable de cuatro kilómetros que cruza la montaña hasta el <strong>Parque Arví</strong>, una reserva de bosque altoandino con senderos y un mercado campesino. Nota: la línea L tiene tarifa aparte y hace falta efectivo.</p></div>

<h3>La mesa paisa</h3>
<p>La comida antioqueña es de montaña, contundente y sin complejos. La <strong>bandeja paisa</strong> ya la conocéis: frijoles, arroz, chicharrón, carne molida, chorizo, morcilla, huevo, arepa, plátano y aguacate. Nació como "plato montañero" para alimentar a arrieros y campesinos.</p>
<p>Más allá: el <strong>mondongo</strong> (sopa de callos, mucho mejor de lo que suena), el <strong>sancocho antioqueño</strong>, la <strong>arepa paisa</strong> —fina, blanca, sin sal, que aquí es un acompañamiento neutro tipo pan y no un plato en sí como en Venezuela—, los <strong>buñuelos</strong> (bolas fritas de queso, imprescindibles) y la <strong>mazamorra</strong>: maíz cocido en leche que se toma con panela y que es el postre-merienda de la abuela paisa.</p>
<p>Y luego está el otro Medellín gastronómico: la ciudad se ha convertido en un destino de café de especialidad y cocina moderna de nivel. Pergamino, Rituales o Café Velvet para tomar el mejor café de vuestra vida; y restaurantes como Alambique o El Cielo (este último, de alta cocina) para ver hasta dónde llega la creatividad local.</p>

<h3>Moverse y comportarse</h3>
<ul>
<li><strong>Metro</strong>: barato, seguro y una experiencia. Comprad billete sencillo en taquilla. Combina con metrocable en el mismo viaje.</li>
<li><strong>Uber, inDrive, DiDi, Cabify</strong>: funcionan bien y son baratos. Uber opera en un limbo legal, así que a veces piden que os sentéis delante para simular que sois un amigo.</li>
<li><strong>Seguridad</strong>: "no dar papaya". El móvil no se saca en la calle en el centro; usadlo dentro de tiendas o cafés. Es la ciudad donde más ocurre el robo en moto.</li>
<li><strong>Bebidas</strong>: no aceptéis tragos de desconocidos en la zona de Lleras; las escopolaminas son un problema real allí.</li>
<li><strong>Aeropuertos</strong>: ojo, son dos. Llegáis a <strong>Olaya Herrera (EOH)</strong>, que está dentro de la ciudad, y salís desde <strong>José María Córdova (MDE)</strong> en Rionegro, a 45-60 minutos por una carretera de montaña. Ese detalle vale una hora de vuestra vida el día 30.</li>
</ul>

<h3>Dos días bien aprovechados</h3>
<p>Con solo una jornada completa, el orden que mejor funciona es: mañana en la Comuna 13 con guía local (10:00), almuerzo de bandeja paisa, tarde en el centro con Plaza Botero y el Museo de Antioquia, y al final del día subir en metrocable para ver la ciudad encenderse desde arriba. Cena tranquila en Provenza y a dormir pronto, porque el vuelo del jueves sale de Rionegro a las ocho.</p>

<p class="lead">San Andrés es Colombia solo en el pasaporte. Está más cerca de Nicaragua que del continente colombiano, se colonizó con puritanos ingleses, se reza en iglesias bautistas, se habla creole y suena reggae. Es el rincón más raro y más fascinante del país.</p>

<h3>Una isla que no debería ser colombiana (y casi no lo es)</h3>
<p>Coged un mapa. San Andrés está a 720 km de la costa colombiana y a 190 km de Nicaragua. Que sea territorio de Colombia es una consecuencia enrevesada de la historia colonial: España reclamaba estas aguas dentro de la Capitanía General de Guatemala y luego del Virreinato de Nueva Granada, pero nunca las pobló de verdad.</p>
<p>Quienes sí lo hicieron fueron los ingleses. Hacia 1629 llegaron colonos puritanos —la misma corriente religiosa del Mayflower— que se asentaron sobre todo en Providencia, y más adelante llegaron plantadores y esclavizados desde Jamaica. Durante dos siglos estas islas fueron un mundo anglocaribeño: algodón, coco, iglesias protestantes e inglés como lengua.</p>
<p>En 1822, tras la independencia, los isleños juraron la Constitución de la Gran Colombia y el archipiélago quedó bajo bandera colombiana. Nicaragua nunca lo aceptó del todo, y el pleito llegó hasta la Corte Internacional de Justicia de La Haya, que en 2012 confirmó la soberanía colombiana sobre las islas pero le entregó a Nicaragua unos 75.000 km² de mar. Fue un shock nacional en Colombia y golpeó duramente a los pescadores locales, que perdieron caladeros históricos. Si sacáis el tema con un isleño, preparaos para escuchar sentimientos fuertes.</p>

<h3>Los raizales: quiénes son realmente los dueños de esto</h3>
<p>La población originaria de las islas se llama <strong>raizal</strong>: afrodescendientes de origen jamaicano y anglocaribeño, protestantes (bautistas y adventistas), con apellidos como Archbold, Livingston, Newball, Bent o Robinson, y con lengua propia.</p>
<p>Esa lengua es el <strong>creole sanandresano</strong>, un criollo de base inglesa emparentado con el jamaicano. La mayoría de los raizales son trilingües: creole en casa y en la calle, inglés en la iglesia y español en la escuela y con el continente. Escuchad con atención en un colectivo o en un puesto de comida: reconoceréis palabras sueltas en inglés dentro de una música completamente distinta.</p>
<p>La historia moderna del archipiélago tiene un punto de inflexión amargo: en 1953 el gobierno de Rojas Pinilla declaró San Andrés <strong>puerto libre</strong>. La isla se llenó de comercios de electrónica y perfumes libres de impuestos y de migración desde el continente. En pocas décadas los raizales pasaron de ser la mayoría a ser una minoría en su propia tierra. Desde 1991 la Constitución les reconoce como grupo étnico con derechos especiales, existe un control de circulación (la tarjeta OCCRE regula quién puede residir en la isla) y hay un movimiento cultural fuerte por preservar la lengua y la iglesia bautista, cuyo templo de loma —blanco, de madera, de 1847— es el edificio más antiguo y más querido de San Andrés.</p>
<p>Todo esto convierte la visita en algo más interesante que "playa caribeña": estáis entrando en un territorio con una identidad propia que ha tenido que pelear por existir.</p>

<h3>Piratas, tesoros y una cueva</h3>
<p>El pirata galés <strong>Henry Morgan</strong> usó estas islas como base a finales del siglo XVII para asaltar Panamá y Portobelo. La leyenda dice que escondió parte de su botín en una cueva de la costa oeste de San Andrés, que hoy se visita como "Cueva de Morgan". El tesoro jamás apareció, y los historiadores dudan de casi todo el relato, pero la historia real es aún mejor: Morgan acabó siendo nombrado teniente gobernador de Jamaica por la Corona inglesa, murió rico y respetable, y hoy da nombre a una marca de ron.</p>
<p>La cueva en sí es una atracción modesta y bastante turística; lo que la rodea (un pequeño museo de la cultura isleña, casas de madera típicas) tiene más interés que el agujero.</p>

<h3>El mar de los siete colores: por qué es de verdad</h3>
<p>El apodo suena a eslogan, pero tiene una explicación física preciosa. El color del agua depende de lo que hay debajo y de la profundidad: la arena blanca de coral triturado refleja la luz y da turquesa claro; las praderas de pasto marino dan verde oliva; las formaciones de coral dan tonos marrones y dorados; los canales profundos dan azul cobalto; y las zonas intermedias, aguamarina y esmeralda. Como el archipiélago está sobre una plataforma poco profunda con parches de todo eso, el resultado son franjas de color perfectamente distinguibles.</p>
<p>La mejor manera de verlo es desde el avión al aterrizar: pedid ventanilla y mirad en los últimos minutos del vuelo. La segunda mejor es desde el mirador de la carretera del oeste, o desde una lancha camino de los cayos.</p>
<p>Todo esto forma parte de la <strong>Reserva de Biosfera Seaflower</strong>, declarada por la UNESCO en 2000: unos 180.000 km² de mar protegido que albergan la tercera barrera coralina más larga del mundo. De ahí que insistan tanto con el protector solar biodegradable y con no tocar ni pisar el coral: el 80% de estos arrecifes está bajo amenaza por el blanqueamiento y el turismo masivo.</p>

<h3>Vuelta a la isla: qué hay en cada punto</h3>
<p>San Andrés mide unos 13 km de largo por 3 de ancho y tiene una carretera circular de unos 30 km. Recorrerla en carrito de golf o moto es EL plan de la isla, y se hace en medio día parando en todas partes. Va así, empezando por el norte y bajando por la costa este:</p>
<div class="barrio"><div class="meta">Norte</div><h4>El Centro y Spratt Bight</h4>
<p>Donde está todo: el aeropuerto (a diez minutos andando de vuestro hotel), la playa principal con su paseo peatonal, los comercios de puerto libre, restaurantes y vida nocturna. La playa de Spratt Bight es preciosa aunque puede tener sargazo según la época. Frente a ella está el cayo más famoso.</p></div>
<div class="barrio"><div class="meta">Costa este</div><h4>San Luis y Rocky Cay</h4>
<p>La zona más tradicionalmente raizal, con casas de madera de colores sobre pilotes y una playa larga y tranquila. Frente a la playa de Rocky Cay hay un islote al que se puede llegar caminando por el agua con marea baja (con precaución: ha habido accidentes) y un barco encallado que se ha convertido en icono fotográfico. Aquí están algunos de los mejores sitios para comer con los pies en la arena.</p></div>
<div class="barrio"><div class="meta">Sur</div><h4>Hoyo Soplador</h4>
<p>En la punta sur, un agujero en la roca coralina por el que el mar expulsa una columna de agua cuando coinciden marea y oleaje. Es un fenómeno natural genuino, aunque muy turistificado: los vendedores insisten en que consumáis algo. Si el mar está plano, no pasa nada de nada. Aun así, la carretera hasta allí y el paisaje de roca negra merecen la parada.</p></div>
<div class="barrio"><div class="meta">Costa oeste</div><h4>West View y La Piscinita</h4>
<p>El lado que da a mar abierto, sin playa de arena pero con el agua más clara y la mejor vida marina de la isla. Son dos balnearios naturales sobre roca con escaleras al agua, trampolines y toboganes. Se alquila equipo de snorkel y venden pan para atraer a los peces. Es el mejor sitio de la isla si os gusta el agua: hay peces loro, sargentos y a veces barracudas pequeñas. Llevad escarpines.</p></div>
<div class="barrio"><div class="meta">Interior</div><h4>La Loma</h4>
<p>La parte alta y el corazón raizal de la isla. Aquí está la <strong>Primera Iglesia Bautista</strong> (1847), de madera blanca, con vistas increíbles desde su torre. Los domingos por la mañana el canto de los coros se oye desde la calle: es una de las cosas más bonitas y menos turísticas que se pueden hacer aquí. También está la Casa Museo Isleña, que explica cómo se vivía antes del puerto libre.</p></div>

<h3>Los cayos: Johnny Cay y El Acuario</h3>
<p><strong>Johnny Cay</strong> es un islote de arena blanca y palmeras a quince minutos en lancha de Spratt Bight, declarado parque regional. Tiene iguanas, música a todo volumen, puestos de pescado frito y el famoso "coco loco" (coco con ron dentro). Es precioso y es masivo: id lo más temprano posible y alejaos del punto de desembarco. El mar alrededor es fuerte y hay zonas donde no se puede bañar; hacedle caso a las banderas.</p>
<p><strong>El Acuario y Haynes Cay</strong> están al este, en la zona de aguas someras: es literalmente un banco de arena en medio del mar donde el agua cubre por la cintura y se ven peces y a veces rayas. La imagen icónica de San Andrés sale de ahí.</p>
<p>Los tours combinados se compran en la playa o en cualquier hotel (70.000-100.000 pesos por persona más entradas). Advertencia: en algunos puntos ofrecen fotos con mantarrayas sujetándolas, o pulpos sacados del agua. Es maltrato animal; no participéis y decidlo con naturalidad.</p>

<h3>Bucear aquí</h3>
<p>San Andrés es un destino de buceo de primera categoría y muy accesible: agua a 28-29 °C, visibilidad de 20-30 metros, y unos 40 puntos de inmersión a pocos minutos en barco. Hay paredes coralinas que caen en vertical (la Pared de Pichonas, el Blue Hole), jardines de coral poco profundos ideales para recién certificados, y varios pecios hundidos a propósito, como el Blue Diamond o el Nicaragüense.</p>
<p>Para alguien recién certificado como Carlos, lo lógico son dos inmersiones de arrecife entre 12 y 18 metros: Palacio de la Cherna, Cantil de Villa Erika o los jardines cercanos a Rocky Cay. Precio orientativo: 200.000-300.000 pesos por inmersión, algo menos si se contratan dos el mismo día. Centros con buena reputación: Banda Dive Shop, Blue Life, Sharky Dive Shop. Reservad por WhatsApp con un par de días.</p>
<p>Dos avisos importantes: llevad el carnet o la certificación digital, y respetad el intervalo sin volar. Con el vuelo del lunes a las 11:15, la última inmersión debe terminar el domingo a mediodía como muy tarde. Adriana, si no bucea, puede hacer un bautismo (discover scuba) o snorkel desde el mismo barco.</p>

<h3>Comer isleño</h3>
<p>La cocina raizal es una rama del Caribe anglófono, no de la colombiana continental, y eso se nota en todo.</p>
<p>El plato ceremonial es el <strong>rondón</strong> (del inglés "run down"): pescado, caracol pala, cola de cerdo salada, yuca, ñame, plátano y albóndigas de harina cocinados lentamente en leche de coco hasta que todo se funde. Tarda horas y se encarga con antelación —por la mañana para comerlo por la noche—. Es contundente, dulzón, ahumado y absolutamente distinto a todo lo demás que vais a comer en Colombia. No os vayáis sin probarlo.</p>
<p>Después: <strong>pescado frito con arroz de coco y patacón</strong> (la comida diaria), <strong>caracol pala</strong> —el molusco emblemático— en albóndigas, ceviche o guisado, <strong>cangrejo negro</strong> en temporada (es una especie endémica que migra en masa al mar para desovar, y durante la migración está prohibido cogerlos), <strong>langosta</strong> a la parrilla, y <strong>patties</strong>, empanadillas de origen jamaicano. De postre, pie de coco o de limón.</p>
<p>Para beber: agua de coco recién abierta a machetazos, jugos naturales, cerveza fría y ron. Y el <strong>coco loco</strong>: coco con ron, leche condensada y lo que caiga.</p>

<h3>Cosas que conviene saber antes de llegar</h3>
<ul>
<li><strong>Tarjeta de Turismo obligatoria</strong>: 153.000 pesos por persona (tarifa 2026). Se compra en el aeropuerto de origen antes de embarcar, se rellena en mayúsculas y sin tachones, y se conserva todo el viaje.</li>
<li><strong>Efectivo</strong>: imprescindible. Lanchas, tours, comida de playa, carritos de golf y muchos restaurantes solo aceptan efectivo, y los cajeros se quedan sin billetes con frecuencia en temporada alta. Traed pesos desde el continente.</li>
<li><strong>Todo es más caro</strong>: se importa por barco o avión. Contad con un 30-50% más que en Medellín.</li>
<li><strong>Agua</strong>: embotellada siempre. La isla tiene problemas serios de suministro.</li>
<li><strong>Alquiler de carrito</strong>: 150.000-250.000 pesos el día; se paga en efectivo y suelen pedir el pasaporte. Comprobad frenos y batería antes de salir, y llenad de gasolina.</li>
<li><strong>Protector solar</strong>: reef-safe (sin oxibenzona ni octinoxato). Es reserva de biosfera y en algunos puntos lo exigen.</li>
<li><strong>Sargazo</strong>: entre mayo y agosto puede llegar alga marrón a las playas del este. No es contaminación, es un fenómeno natural del Atlántico. Las playas del oeste y los cayos suelen estar limpios.</li>
<li><strong>Ritmo isleño</strong>: aquí nadie corre y las cosas empiezan tarde. Si un tour dice a las nueve, saldrá a las nueve y media. Es parte del trato.</li>
</ul>

bog:`<span class="rtime">📖 Lectura de ~20 min</span>
<p class="lead">Bogotá no seduce en veinte minutos como Cartagena. Es fría, enorme, gris a ratos, y está a 2.640 metros de altitud. Pero es la ciudad donde Colombia piensa, discute, come mejor de lo que parece y guarda el oro de sus antepasados. Con día y medio bien usados, se le coge el punto.</p>

<h3>La sabana, los muiscas y El Dorado</h3>
<p>Antes de los españoles, esta altiplanicie a 2.600 metros estaba habitada por los <strong>muiscas</strong>, una de las cuatro grandes civilizaciones precolombinas de América junto a mayas, aztecas e incas. No construyeron pirámides de piedra —su arquitectura era de madera y barro, y por eso desapareció— pero tenían una organización política sofisticada dividida en dos confederaciones, una red comercial que llegaba hasta Venezuela y una orfebrería extraordinaria.</p>
<p>Su rasgo más famoso es el ritual de investidura del cacique de Guatavita: el nuevo gobernante se cubría el cuerpo de polvo de oro, navegaba en una balsa hasta el centro de la laguna sagrada y se sumergía mientras se arrojaban ofrendas de oro y esmeraldas al agua. De ahí nació la leyenda de <strong>El Dorado</strong>, que enloqueció a los europeos durante dos siglos y provocó expediciones suicidas por toda Sudamérica. Buscaban una ciudad de oro; lo que había era un rito.</p>
<p>La pieza que representa ese ritual —la <strong>Balsa Muisca</strong>, una figura de oro de apenas 20 centímetros encontrada casualmente en 1969 en una cueva— es el objeto más importante del Museo del Oro y probablemente el más famoso de Colombia. Vais a verla el martes por la mañana.</p>
<p>Gonzalo Jiménez de Quesada fundó aquí Santa Fe en 1538. La ciudad se convirtió en capital del Virreinato de Nueva Granada y en un centro intelectual con fama de culto: la llamaban "la Atenas suramericana", en parte con orgullo y en parte con sorna.</p>

<h3>El florero, el Bogotazo y las cicatrices</h3>
<p>El 20 de julio de 1810, un grupo de criollos entró en la tienda del comerciante español José González Llorente a pedirle prestado un florero para agasajar a un visitante. Sabían que se negaría. La negativa provocó una trifulca planeada, la trifulca provocó un tumulto y el tumulto acabó en la formación de una junta de gobierno. Es la fecha nacional de Colombia y todo empezó, literalmente, por un jarrón. Los restos del florero se conservan en el Museo de la Independencia, en la Plaza de Bolívar.</p>
<p>El otro día que marcó a la ciudad fue el <strong>9 de abril de 1948</strong>: el asesinato a tiros del líder liberal Jorge Eliécer Gaitán, favorito para ganar la presidencia, desató una explosión de furia popular que arrasó el centro. Se conoce como el <strong>Bogotazo</strong>: tres días de incendios, saqueos y miles de muertos que destruyeron buena parte de la arquitectura colonial y marcaron el inicio de La Violencia, el periodo de guerra civil entre liberales y conservadores que dejó unos 200.000 muertos y del que arranca, en última instancia, el conflicto armado colombiano.</p>
<p>Por eso el centro de Bogotá es una mezcla extraña de casonas coloniales supervivientes, edificios modernos levantados sobre lo quemado y grandes moles de los años cincuenta. Y por eso la Plaza de Bolívar, rodeada por el Capitolio, la Catedral, la Alcaldía y el Palacio de Justicia —este último también asaltado y quemado en 1985 durante la toma del M-19—, no es solo una plaza bonita: es donde ha pasado todo.</p>

<h3>Vivir a 2.640 metros</h3>
<p>La altitud lo condiciona todo. El aire tiene un 25% menos de oxígeno que a nivel del mar; subiendo cuestas os faltará el aliento los primeros días, el alcohol pega bastante más y conviene beber mucha agua. Si venís directos de San Andrés —del nivel del mar y del calor—, el contraste será brutal: pasaréis de 30 °C a un día bogotano de 12-19 °C con lluvia fina.</p>
<p>Bogotá no tiene estaciones: tiene el mismo clima todos los días del año, entre 7 y 19 grados, y una capacidad legendaria para darte sol, granizo y arcoíris en la misma tarde. Los bogotanos salen siempre con chaqueta y paraguas, hagan el tiempo que hagan. Copiadles.</p>
<p>Un par de detalles culturales: los bogotanos, llamados <em>rolos</em> o <em>cachacos</em>, tienen fama en el resto del país de formales, corteses hasta el exceso y algo distantes. Usan el "usted" incluso entre amigos íntimos y en la pareja, lo cual descoloca a cualquier español. Hablan un castellano muy claro, considerado de los más neutros de América.</p>

<h3>Barrio por barrio</h3>
<div class="barrio"><div class="meta">El casco histórico</div><h4>La Candelaria</h4>
<p>El centro colonial y el sitio con más cosas que ver: la <strong>Plaza de Bolívar</strong>, el <strong>Museo del Oro</strong> (34.000 piezas de orfebrería prehispánica; el mejor de su clase en el mundo, y cuesta poco más de un euro), el <strong>Museo Botero</strong> (gratis, con obra propia del artista y su colección personal de Picasso, Monet o Dalí), la casa-museo de la Quinta de Bolívar y el <strong>Chorro de Quevedo</strong>, la plazoleta donde se supone que se fundó la ciudad y donde hoy se bebe <em>chicha</em>, la bebida fermentada de maíz de los muiscas.</p>
<p>Es un barrio de calles empinadas y estrechas, casas coloniales pintadas de colores, universidades, arte urbano de primer nivel y muchos estudiantes. De día es fantástico. De noche, mejor moverse en taxi y no callejear.</p></div>
<div class="barrio"><div class="meta">Vuestra zona</div><h4>Chicó, Parque de la 93 y Zona T</h4>
<p>El norte acomodado, donde está vuestro hotel. El <strong>Parque de la 93</strong> es una manzana verde rodeada de restaurantes y terrazas, agradable y muy segura, perfecta para cenar sin complicaciones. Un poco más al sur, la <strong>Zona T</strong> y la <strong>Zona G</strong> (de "gourmet") concentran la mejor oferta gastronómica de la ciudad. Es una Bogotá cómoda y algo burbuja, pero después de dos semanas de viaje se agradece.</p></div>
<div class="barrio"><div class="meta">Con encanto</div><h4>Usaquén</h4>
<p>Un antiguo pueblo colonial absorbido por la ciudad, al norte. Tiene plaza, iglesia, calles empedradas y un mercado de las pulgas los domingos muy popular. Buenos restaurantes en casas antiguas. Si tuvierais una mañana extra, aquí.</p></div>
<div class="barrio"><div class="meta">La montaña</div><h4>Monserrate</h4>
<p>El cerro de 3.152 metros que preside la ciudad, con su santuario del Señor Caído, destino de peregrinación desde el siglo XVII. Se sube en funicular, en teleférico o andando (un camino de escaleras que los bogotanos usan como gimnasio los domingos; no se recomienda subir a pie fuera de horas concurridas). Arriba hace frío y viento, hay restaurantes y un mercadillo, y la vista de los ocho millones de habitantes extendiéndose por la sabana es sobrecogedora, sobre todo al atardecer, cuando se encienden las luces.</p></div>

<h3>La cocina bogotana</h3>
<p>El plato emblema es el <strong>ajiaco santafereño</strong>: una sopa espesa de pollo con tres variedades de papa —una de ellas, la criolla, se deshace y da cuerpo—, mazorca, alcaparras, crema de leche y una hierba llamada <em>guascas</em> que apenas se usa fuera de esta zona y que le da todo el sabor. Con el frío de aquí, es exactamente lo que el cuerpo pide.</p>
<p>Después: el <strong>tamal</strong> —masa de maíz con pollo, cerdo, garbanzos y verduras envuelta en hoja de plátano y cocida al vapor—, que se come de desayuno acompañado de <strong>chocolate completo</strong>: una taza de chocolate caliente con un trozo de queso fresco dentro que se derrite y se come con cuchara. Suena raro, funciona perfectamente, y es el desayuno bogotano de siempre. Añadid una <strong>almojábana</strong> o un <strong>pandebono</strong>.</p>
<p>Otras cosas: la <strong>changua</strong> (sopa de leche con huevo y cilantro, desayuno de resistencia), el <strong>puchero</strong>, la fritanga de plaza de mercado, y los <strong>obleas</strong> con arequipe de postre. Y una recomendación: Bogotá tiene hoy una escena gastronómica seria, con restaurantes de cocina colombiana contemporánea que trabajan con ingredientes amazónicos y del Pacífico que no encontraréis en ningún otro sitio.</p>
<blockquote>Curiosidad frutal: pedid un jugo de <em>lulo</em>, de <em>curuba</em>, de <em>feijoa</em> o de <em>gulupa</em>. Colombia tiene decenas de frutas que no se exportan porque no aguantan el viaje. Es de las mejores cosas del país.</blockquote>

<h3>Moverse, y el asunto del tráfico</h3>
<p>Bogotá tiene fama merecida de atascos monumentales. El sistema de transporte principal es <strong>TransMilenio</strong>, autobuses articulados en carril exclusivo: eficaz en teoría, saturadísimo en la práctica y con problemas de carterismo; con maletas no es opción. Para vosotros, taxi por app (Uber, Cabify, DiDi, inDrive) es lo sensato.</p>
<p>Dato crítico para el día 4: del norte al aeropuerto El Dorado puede haber entre 40 y 90 minutos según la hora. Con un vuelo internacional a las 17:20, salir del hotel a las 14:00 no es exagerado, es prudente.</p>
<p>Y un detalle bonito: los domingos y festivos, de 7 a 14 h, más de 120 km de vías principales se cierran al tráfico para la <strong>Ciclovía</strong>, y la ciudad entera sale a pedalear, correr y pasear al perro. Nació en 1974 y se ha copiado en decenas de ciudades del mundo. Vuestro domingo caerá en San Andrés, pero merece saberse.</p>

<h3>Cómo aprovechar tarde y mañana</h3>
<p>Llegáis el lunes a las 13:30, y el lunes tiene una trampa: el Museo del Oro cierra los lunes. Así que la tarde ideal es Monserrate —subid sobre las 16:00-16:30 para ver la ciudad de día y de noche— y cena tranquila cerca del hotel.</p>
<p>El martes por la mañana, con las maletas en consigna: Museo del Oro a las 9:00 en punto (abre a esa hora y se disfruta vacío), paseo por La Candelaria hasta la Plaza de Bolívar, y almuerzo temprano de tamal y chocolate completo en algún clásico del centro. A las 14:00, de vuelta al hotel a por el equipaje y al aeropuerto.</p>
<p>Si el cuerpo pide museos, dos apuntes: el <strong>Museo Botero</strong> es gratuito y está a cinco minutos del Museo del Oro, y el <strong>Museo Nacional</strong>, en un antiguo panóptico, cuenta la historia del país entero. Cualquiera de los dos encaja si el martes cunde.</p>
