<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Colombia · Carlos & Adriana</title>
<meta name="description" content="Guía de viaje Colombia 21 jul – 4 ago 2026">
<meta name="theme-color" content="#10393B">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Colombia">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#17302E; --ink-soft:#4A615E; --paper:#FBFAF4; --card:#FFFFFF;
  --line:#E4E0D2; --deep:#10393B;
  --ctg:#E2574C; --sal:#3E8E5A; --med:#C94F7C; --adz:#1699A3; --bog:#C99527;
  --radius:16px; --nav-h:64px;
  --stripe:linear-gradient(90deg,#0E7C86 0%,#12A5A0 18%,#35C4B5 36%,#7FD8C9 52%,#B8E8DB 66%,#E2574C 82%,#C99527 100%);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'Karla',system-ui,sans-serif;background:var(--paper);color:var(--ink);
  font-size:16px;line-height:1.55;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
}
h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;line-height:1.15}
.stripe{height:5px;background:var(--stripe);border-radius:3px}

/* ---------- Header ---------- */
header.app{
  background:var(--deep);color:#F2EFE4;padding:calc(14px + env(safe-area-inset-top)) 18px 16px;
  position:sticky;top:0;z-index:40;
}
header.app .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;opacity:.75;font-weight:700}
header.app h1{font-size:26px;font-weight:900;margin:2px 0 8px}
header.app h1 em{font-style:italic;color:#7FD8C9}
header.app .stripe{opacity:.95}

/* ---------- Layout ---------- */
main{max-width:640px;margin:0 auto;padding:16px 16px 32px}
.view{display:none;animation:fade .25s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- Bottom nav ---------- */
nav.tabs{
  position:fixed;bottom:0;left:0;right:0;z-index:50;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:rgba(251,250,244,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--line);display:flex;
}
nav.tabs button{
  flex:1;background:none;border:none;font-family:'Karla',sans-serif;font-size:11px;font-weight:700;
  color:var(--ink-soft);display:flex;flex-direction:column;align-items:center;gap:3px;padding-top:9px;cursor:pointer;
}
nav.tabs button .ico{font-size:20px;line-height:1}
nav.tabs button.on{color:var(--deep)}
nav.tabs button.on .ico{transform:scale(1.12)}

/* ---------- Cards & chips ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.chip{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;color:#fff}
.muted{color:var(--ink-soft);font-size:14px}
.small{font-size:13px}

/* ---------- Timeline (itinerario) ---------- */
.tl{position:relative;padding-left:26px}
.tl::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:3px;border-radius:2px;background:var(--stripe)}
.tl-item{position:relative;margin-bottom:16px}
.tl-item::before{
  content:"";position:absolute;left:-24px;top:8px;width:13px;height:13px;border-radius:50%;
  background:var(--dot,#888);border:3px solid var(--paper);box-shadow:0 0 0 2px var(--dot,#888);
}
.tl-item .dates{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dot,#666)}
.tl-item h3{font-size:20px;margin:1px 0 3px}
.flight{
  background:#F1F6F2;border:1px dashed #BFD3C5;border-radius:12px;padding:10px 12px;margin:10px 0;
  font-size:13.5px;
}
.flight b{font-family:'Fraunces',serif;font-size:15px}
.flight .code{font-weight:700;letter-spacing:.04em}

/* ---------- City cards grid ---------- */
.city-card{
  display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;
  background:var(--card);border:1px solid var(--line);border-left:6px solid var(--c,#999);
  border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;font-family:inherit;color:inherit;
}
.city-card .em{font-size:28px}
.city-card h3{font-size:19px}
.city-card .muted{margin-top:1px}
.city-card .arrow{margin-left:auto;color:var(--c,#999);font-size:20px;font-weight:700}

/* ---------- City page ---------- */
.city-head{border-radius:var(--radius);padding:20px 18px;color:#fff;margin-bottom:14px;background:var(--c,#333)}
.city-head .back{background:rgba(255,255,255,.22);border:none;color:#fff;font-weight:700;font-size:13px;
  padding:6px 12px;border-radius:999px;cursor:pointer;margin-bottom:10px;font-family:inherit}
.city-head h2{font-size:30px;font-weight:900}
.city-head .dates{font-size:13px;font-weight:700;opacity:.92;margin-top:2px}
.secnav{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.secnav::-webkit-scrollbar{display:none}
.secnav button{
  flex:0 0 auto;border:1.5px solid var(--c,#999);color:var(--c,#333);background:transparent;
  font-family:inherit;font-weight:700;font-size:13px;padding:6px 13px;border-radius:999px;cursor:pointer;
}
.secnav button.on{background:var(--c,#333);color:#fff}
.sec{display:none}
.sec.on{display:block;animation:fade .2s ease}
.sec h3{font-size:17px;margin:16px 0 6px;display:flex;align-items:center;gap:8px}
.sec h3::before{content:"";width:14px;height:5px;border-radius:3px;background:var(--c,#333);display:inline-block}
.sec p{margin-bottom:10px}
.sec ul{padding-left:0;list-style:none}
.sec li{padding:8px 0 8px 0;border-bottom:1px solid var(--line)}
.sec li:last-child{border-bottom:none}
.sec li b{display:block}
.sec li .muted{display:block;margin-top:1px}
.tag{display:inline-block;font-size:11px;font-weight:700;border-radius:6px;padding:1px 7px;margin-left:6px;vertical-align:2px}
.tag.eco{background:#E4F2E7;color:#2C6E44}
.tag.mid{background:#FBEEDB;color:#9A6415}
.tag.top{background:#F6E3EC;color:#A03568}
.note{
  border-radius:12px;padding:12px 14px;margin:12px 0;font-size:14px;
  background:#FFF6E3;border:1px solid #ECD9A6;
}
.note.alert{background:#FDEBE8;border-color:#EFC0B8}
.note b{font-family:'Fraunces',serif}
.dayplan{border-left:3px solid var(--c,#999);padding:2px 0 2px 12px;margin:12px 0}
.dayplan .d{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--c,#666)}

/* ---------- Práctico ---------- */
.pract h2{font-size:22px;margin:6px 0 12px}
details{border:1px solid var(--line);border-radius:var(--radius);background:var(--card);margin-bottom:10px;overflow:hidden}
summary{list-style:none;cursor:pointer;padding:14px 16px;font-weight:700;font-family:'Fraunces',serif;font-size:16.5px;display:flex;align-items:center;gap:10px}
summary::-webkit-details-marker{display:none}
summary .em{font-size:19px}
summary::after{content:"+";margin-left:auto;font-size:20px;color:var(--ink-soft);font-family:'Karla',sans-serif}
details[open] summary::after{content:"–"}
details .bd{padding:0 16px 14px;font-size:14.5px}
details .bd ul{padding-left:18px;margin:6px 0}
details .bd li{margin-bottom:5px}

/* ---------- Tareas ---------- */
.day-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.day-card.today{border:2px solid var(--adz);box-shadow:0 2px 14px rgba(22,153,163,.18)}
.day-card .dh{padding:12px 16px 8px;display:flex;align-items:baseline;gap:8px}
.day-card .dh h3{font-size:16.5px}
.day-card .dh .where{margin-left:auto;font-size:12px;font-weight:700;color:#fff;border-radius:999px;padding:2px 10px}
.day-card .dh .today-tag{font-size:11px;font-weight:700;color:var(--adz)}
.todo{display:flex;align-items:flex-start;gap:11px;padding:10px 16px;border-top:1px solid var(--line);cursor:pointer;user-select:none}
.todo input{margin-top:3px;width:19px;height:19px;accent-color:var(--adz);flex:none;cursor:pointer}
.todo .tx{font-size:14.5px}
.todo.done .tx{text-decoration:line-through;color:var(--ink-soft);opacity:.75}
.todo .ck{font-size:12px;color:var(--ink-soft);display:block}
.todo.checkin{background:#F0F8F8}
.addrow{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--line)}
.addrow input{flex:1;border:1px solid var(--line);border-radius:10px;padding:8px 12px;font:inherit;font-size:14px;background:var(--paper)}
.addrow button{border:none;background:var(--deep);color:#fff;font-weight:700;border-radius:10px;padding:0 14px;font-size:18px;cursor:pointer}
.todo .del{margin-left:auto;border:none;background:none;color:#C0574C;font-size:16px;cursor:pointer;padding:0 2px;flex:none}
.progressbar{height:6px;background:#EAE7DA;border-radius:3px;overflow:hidden;margin:8px 0 14px}
.progressbar i{display:block;height:100%;background:var(--stripe);border-radius:3px;transition:width .3s}

/* ---------- Maps links & conversor ---------- */
a.gm{text-decoration:none;font-size:13px;margin-left:6px;vertical-align:1px}
.hotel-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.22);border:none;color:#fff;
  font-weight:700;font-size:13px;padding:6px 12px;border-radius:999px;cursor:pointer;font-family:inherit;text-decoration:none;margin-top:10px}
.conv .row{display:flex;gap:10px;align-items:center;margin:8px 0}
.conv input{flex:1;min-width:0;border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;font:inherit;font-size:17px;font-weight:700;background:var(--paper)}
.conv .eq{font-size:18px;color:var(--ink-soft)}
.conv .cur{font-weight:700;font-size:14px;color:var(--ink-soft);width:38px;flex:none}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chips button{border:1.5px solid var(--deep);color:var(--deep);background:transparent;font-family:inherit;font-weight:700;
  font-size:13px;padding:6px 12px;border-radius:999px;cursor:pointer}
.rate-row{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:13px;color:var(--ink-soft)}
.rate-row input{width:76px;border:1px solid var(--line);border-radius:8px;padding:4px 8px;font:inherit;font-size:14px;text-align:center;background:var(--paper)}

/* ---------- Modo historia (stories) ---------- */
.story-btn{display:flex;align-items:center;gap:10px;width:100%;border:none;cursor:pointer;font-family:inherit;
  background:linear-gradient(100deg,var(--c,#333),color-mix(in srgb,var(--c,#333) 55%,#10393B));
  color:#fff;border-radius:14px;padding:14px 16px;margin:4px 0 14px;text-align:left}
.story-btn .big{font-family:'Fraunces',serif;font-weight:700;font-size:16px}
.story-btn .sub{font-size:12px;opacity:.85}
.story-btn .play{margin-left:auto;font-size:22px}
#story{position:fixed;inset:0;z-index:100;display:none;color:#fff;overflow:hidden;
  -webkit-user-select:none;user-select:none}
#story.on{display:block}
#story .bg{position:absolute;inset:0;background:var(--sc,#333)}
#story .bg::after{content:"";position:absolute;inset:0;
  background:radial-gradient(120% 90% at 50% 108%, rgba(255,255,255,.28), transparent 60%),
             linear-gradient(180deg, rgba(0,0,0,.35), transparent 30%, transparent 65%, rgba(0,0,0,.45))}
#story .bars{position:absolute;top:calc(10px + env(safe-area-inset-top));left:12px;right:12px;display:flex;gap:5px;z-index:3}
#story .bars i{flex:1;height:3.5px;border-radius:2px;background:rgba(255,255,255,.32)}
#story .bars i.done{background:#fff}
#story .close{position:absolute;top:calc(24px + env(safe-area-inset-top));right:14px;z-index:4;border:none;
  background:rgba(0,0,0,.3);color:#fff;font-size:17px;width:38px;height:38px;border-radius:50%;cursor:pointer}
#story .slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;
  padding:0 30px calc(40px + env(safe-area-inset-bottom));z-index:2;animation:storyIn .32s ease}
@keyframes storyIn{from{opacity:0;transform:scale(1.03)}to{opacity:1;transform:none}}
#story .em{font-size:72px;line-height:1;margin-bottom:14px;filter:drop-shadow(0 4px 14px rgba(0,0,0,.3))}
#story .yr{font-family:'Fraunces',serif;font-weight:900;font-size:52px;line-height:1;letter-spacing:-.01em;
  text-shadow:0 3px 18px rgba(0,0,0,.35)}
#story .tt{font-family:'Fraunces',serif;font-weight:700;font-size:22px;margin:8px 0 10px}
#story .tx{font-size:16.5px;line-height:1.55;max-width:480px;text-shadow:0 1px 8px rgba(0,0,0,.3)}
#story .hint{position:absolute;bottom:calc(14px + env(safe-area-inset-bottom));left:0;right:0;text-align:center;
  font-size:12px;opacity:.75;z-index:2}
#story .tap{position:absolute;top:0;bottom:0;width:38%;z-index:3;background:none;border:none;cursor:pointer}
#story .tap.l{left:0}  #story .tap.r{right:0;width:62%}

@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
button:focus-visible,summary:focus-visible{outline:3px solid #35C4B5;outline-offset:2px}
</style>
</head>
<body>

<header class="app">
  <div class="eyebrow">21 jul – 4 ago 2026 · Carlos & Adriana</div>
  <h1>Colombia, <em>el país de la belleza</em></h1>
  <div class="stripe"></div>
</header>

<main>
  <section id="view-itinerario" class="view on"></section>
  <section id="view-ciudades" class="view"></section>
  <section id="view-ciudad" class="view"></section>
  <section id="view-tareas" class="view"></section>
  <section id="view-practico" class="view pract"></section>
</main>

<div id="story" role="dialog" aria-label="Historia visual">
  <div class="bg"></div>
  <div class="bars"></div>
  <button class="close" onclick="closeStory()" aria-label="Cerrar">✕</button>
  <div class="slide"></div>
  <div class="hint">Toca para avanzar · lado izquierdo para volver</div>
  <button class="tap l" onclick="storyMove(-1)" aria-label="Anterior"></button>
  <button class="tap r" onclick="storyMove(1)" aria-label="Siguiente"></button>
</div>

<nav class="tabs">
  <button id="tab-itinerario" class="on" onclick="go('itinerario')"><span class="ico">🧭</span>Itinerario</button>
  <button id="tab-ciudades" onclick="go('ciudades')"><span class="ico">🏝️</span>Ciudades</button>
  <button id="tab-tareas" onclick="go('tareas')"><span class="ico">✅</span>Tareas</button>
  <button id="tab-practico" onclick="go('practico')"><span class="ico">💡</span>Práctico</button>
</nav>

<script>
/* ================= DATOS DEL VIAJE ================= */
const VUELOS = [
 {d:"21 jul · 16:25→19:30", r:"MAD → BOG", a:"Iberia IB153", n:"Barajas T4S → El Dorado T1 · Sin maleta facturada incluida"},
 {d:"25 jul · 20:28→21:54", r:"CTG → PEI", a:"JetSmart JA5541 · XDJDHN", n:"Cartagena → Pereira (Matecaña)"},
 {d:"28 jul · 16:40→17:25", r:"PEI → EOH", a:"Clic Air VE9059 · TDFUTW", n:"Pereira → Medellín ¡Olaya Herrera, el aeropuerto DEL CENTRO!"},
 {d:"30 jul · 08:00→09:51", r:"MDE → ADZ", a:"JetSmart JA5450 · ODG8XN", n:"¡Sale de Rionegro (José M. Córdova), a 45-60 min de El Poblado!"},
 {d:"3 ago · 11:15→13:30", r:"ADZ → BOG", a:"JetSmart JA5361 · JE7KYK", n:"San Andrés → Bogotá"},
 {d:"4 ago · 17:20→10:00+1", r:"BOG → MAD", a:"Iberia IB152", n:"Llegada a Madrid el 5 ago · Sin maleta facturada incluida"},
];

const ETAPAS = [
 {id:"ctg", c:"var(--ctg)", f:"21 – 25 jul", t:"Cartagena de Indias", h:"Faranda Collection Cartagena ★★★★★ (congreso)",
  x:"Congreso de Adriana (mié-vie mañana) + curso de buceo de Carlos. Hotel en Cielo Mar: playa propia, a 10 min del aeropuerto y 15-20 del centro.",
  vuelo:0, vueloSalida:1},
 {id:"sal", c:"var(--sal)", f:"25 – 28 jul", t:"Salento · Eje Cafetero", h:"La Posada de la Plaza (139 €)",
  x:"Valle de Cocora, fincas de café y pueblos de colores. Llegáis a Pereira a las 21:54 → ~1 h en taxi a Salento.",
  vueloSalida:2},
 {id:"med", c:"var(--med)", f:"28 – 30 jul", t:"Medellín", h:"Poblado Guest House (94 €)",
  x:"La ciudad de la eterna primavera: Comuna 13, Plaza Botero y metrocable.",
  vueloSalida:3},
 {id:"adz", c:"var(--adz)", f:"30 jul – 3 ago", t:"San Andrés", h:"Dreamer Beach Club (587 €)",
  x:"El mar de los siete colores: Johnny Cay, snorkel, vuelta a la isla y cultura raizal.",
  vueloSalida:4},
 {id:"bog", c:"var(--bog)", f:"3 – 4 ago", t:"Bogotá", h:"NH Bogotá Urban 93 Royal (59 €)",
  x:"Última parada: La Candelaria, Monserrate y Museo del Oro antes de volar a Madrid.",
  vueloSalida:5},
];

function gmaps(q){ return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`; }
function gmLink(q){ return `<a class="gm" href="${gmaps(q)}" target="_blank" rel="noopener" aria-label="Abrir en Google Maps">📍</a>`; }

const HOTELES = {
  ctg:"Faranda Collection Cartagena",
  sal:"La Posada de la Plaza, Salento, Quindío",
  med:"Poblado Guest House, Medellín",
  adz:"Dreamer Beach Club, San Andrés isla",
  bog:"NH Bogotá Urban 93 Royal, Bogotá",
};

function flightHTML(i){
  const v = VUELOS[i];
  return `<div class="flight">✈️ <b>${v.r}</b> · ${v.d}<br><span class="code">${v.a}</span><br><span class="muted small">${v.n}</span></div>`;
}

document.getElementById('view-itinerario').innerHTML = `
  <div class="card" style="border-left:6px solid var(--deep)">
    <h2 style="font-size:21px">Vuestro viaje en 15 días</h2>
    <p class="muted" style="margin-top:4px">6 vuelos · 5 destinos · 2 viajeros. Toca cada ciudad en la pestaña <b>Ciudades</b> para ver qué hacer, dónde comer y el plan día a día.</p>
  </div>
  <div class="tl">
    <div class="tl-item" style="--dot:#6b7f7d">
      <div class="dates">21 jul</div><h3>Madrid → Bogotá → Cartagena</h3>
      ${flightHTML(0)}
      <p class="muted small">Llegáis a Bogotá a las 19:30 y conectáis a Cartagena (vuelo doméstico esa noche). El Dorado T1: migración + recogida y re-facturación si lleváis maleta.</p>
    </div>
    ${ETAPAS.map((e,idx)=>`
    <div class="tl-item" style="--dot:${e.c}">
      <div class="dates">${e.f}</div><h3>${e.t}</h3>
      <p class="small"><b>🛏 ${e.h}</b>${HOTELES[e.id]?gmLink(HOTELES[e.id]):""}</p>
      <p class="muted small">${e.x}</p>
      ${e.vueloSalida!==undefined?flightHTML(e.vueloSalida):""}
    </div>`).join("")}
    <div class="tl-item" style="--dot:#6b7f7d">
      <div class="dates">5 ago · 10:00</div><h3>Llegada a Madrid</h3>
      <p class="muted small">Fin del viaje. ¡A revelar las fotos! 📸</p>
    </div>
  </div>
  <div class="note"><b>⚠️ Tres avisos clave:</b><br>
  1️⃣ En Medellín llegáis a <b>Olaya Herrera</b> (centro) pero salís desde <b>Rionegro</b>: el 30 jul el vuelo es a las 08:00 → salir del hotel a las <b>05:00</b>.<br>
  2️⃣ Antes de embarcar a San Andrés hay que comprar la <b>Tarjeta de Turismo (COP 153.000/persona, 2026)</b> en el counter de JetSmart en Rionegro.<br>
  3️⃣ Iberia: <b>sin maleta facturada incluida</b> en MAD↔BOG. Comprobad si la habéis añadido.</div>
`;

/* ================= CIUDADES ================= */
const CIUDADES = [
/* ---------- CARTAGENA ---------- */
{ id:"ctg", em:"🏰", nombre:"Cartagena de Indias", color:"var(--ctg)", fechas:"21 – 25 jul",
  intro:"Caribe, murallas y calles de colores",
  secs:{
  "Historia & curiosidades":`
    <p>Fundada en <b>1533</b>, fue el gran puerto del imperio español en América: por aquí salía el oro y la plata hacia Sevilla, y por eso la atacaron piratas como Francis Drake, que la saqueó en 1586. La respuesta fueron <b>11 km de murallas</b> y el castillo de San Felipe, la mayor fortaleza española del continente.</p>
    <p>En 1741 resistió el asedio inglés del almirante Vernon gracias a <b>Blas de Lezo</b>, un almirante vasco cojo, tuerto y manco ("Mediohombre") que con 6 barcos venció a una flota de casi 200. Su estatua está frente al castillo.</p>

  "Historia & curiosidades":`
    <p>Salento es el pueblo más antiguo del Quindío (1842), nacido en la <b>colonización antioqueña</b>: familias paisas que bajaron a pie abriendo montaña y sembrando café. Sus casas de <b>bahareque</b> con balcones pintados de todos los colores son el símbolo del <b>Paisaje Cultural Cafetero</b>, Patrimonio de la Humanidad UNESCO desde 2011.</p>
    <p>Los <b>jeeps Willys</b> que veréis en la plaza llegaron como excedente militar de la II Guerra Mundial y se convirtieron en el transporte cafetero por excelencia — aún hoy salen de la plaza cargados de gente, café y plátanos ("un Willys lleno" es una unidad de medida local: el <i>yipao</i>).</p>
    <p>💡 <b>Curiosidad:</b> la <b>palma de cera del Quindío</b>, el árbol nacional de Colombia, crece solo aquí y alcanza <b>60 metros</b> — la palmera más alta del mundo. Estuvo a punto de extinguirse porque sus hojas se usaban en Domingo de Ramos.</p>`,

    <p>Capital de Antioquia y cuna de la cultura <b>paisa</b>, creció con el café y la industria textil. En los 80-90 fue la ciudad más violenta del mundo por el cartel de Pablo Escobar; hoy es el ejemplo mundial de <b>transformación urbana</b>: el metro (el único de Colombia, y del que los paisas presumen con orgullo religioso), los metrocables que subieron a los barrios de ladera y las bibliotecas-parque le valieron el premio a la ciudad más innovadora del mundo (2013).</p>
    <p>La <b>Comuna 13</b>, antes zona de guerra, es hoy un museo de arte urbano al aire libre con escaleras eléctricas públicas — la mejor síntesis de esa historia.</p>
    <p>💡 <b>Curiosidades:</b> aquí nacieron <b>Fernando Botero</b> (sus gordas esculturas llenan la Plaza Botero) y <b>Juanes</b>, y se celebra cada agosto la Feria de las Flores con los <i>silleteros</i>. Estáis a 1.500 m: clima perfecto de 24 °C todo el año, de ahí lo de "eterna primavera". Nota de vocabulario: aquí todo es "¡Qué chimba!" (genial) y a todos os dirán "pues" cada tres palabras, pues.</p>`,

    <p>Escuchad el <b>creole sanandresano</b> (inglés criollo) y el reggae, calipso y soca que suenan en cada esquina. Todo el archipiélago es la <b>Reserva de Biosfera Seaflower</b> (UNESCO), con la tercera barrera de coral más grande del mundo.</p>

function buildCity(id){
  const c = CIUDADES.find(x=>x.id===id);
  const keys = Object.keys(c.secs);
  document.getElementById('view-ciudad').innerHTML = `
    <div class="city-head" style="--c:${c.color};background:${c.color}">
      <button class="back" onclick="go('ciudades')">‹ Ciudades</button>
      <h2>${c.em} ${c.nombre}</h2>
      <div class="dates">${c.fechas} · ${c.intro}</div>
      ${HOTELES[c.id]?`<a class="hotel-btn" href="${gmaps(HOTELES[c.id])}" target="_blank" rel="noopener">🏨 Vuestro hotel en Maps ›</a>`:""}
    </div>
    <div class="secnav" style="--c:${c.color}">
      ${keys.map((k,i)=>`<button class="${i===0?'on':''}" style="--c:${c.color}" onclick="openSec(this,'${c.id}-s${i}')">${k}</button>`).join("")}
    </div>
    ${keys.map((k,i)=>`<div class="sec ${i===0?'on':''}" id="${c.id}-s${i}" style="--c:${c.color}">${c.secs[k]}</div>`).join("")}
  `;
  /* botón de modo historia al inicio de la sección Historia */
  const hist = document.getElementById(c.id+'-s0');
  if(hist && STORIES[c.id]){
    hist.insertAdjacentHTML('afterbegin',
      `<button class="story-btn" style="--c:${c.color}" onclick="openStory('${c.id}')">
        <span><span class="big">▶ Ver como historia</span><br><span class="sub">${STORIES[c.id].slides.length} momentos que explican ${c.nombre.split('&')[0].trim()}</span></span>
        <span class="play">🎬</span>
      </button>`);
  }
  /* añade 📍 a cada sitio/restaurante de las listas */
  document.querySelectorAll('#view-ciudad .sec li > b').forEach(b=>{
    const name = Array.from(b.childNodes).filter(n=>n.nodeType===3).map(n=>n.textContent).join('').trim();
    if(name.length>2) b.insertAdjacentHTML('beforeend', gmLink(name + ', ' + c.nombre.split('&')[0].trim() + ', Colombia'));
  });
}
function openSec(btn,id){
  const wrap = document.getElementById('view-ciudad');
  wrap.querySelectorAll('.secnav button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  wrap.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

  const n = new Date();
  if(n.getFullYear()!==2026) return null;
  return String(n.getMonth()+1).padStart(2,'0') + String(n.getDate()).padStart(2,'0');
}
function allItems(){ 
  const custom = store.get(KEY_CUSTOM) || {};
  return DIAS.flatMap(d=>[...d.items, ...(custom[d.k]||[])]);
}
function renderTareas(){
  const done = store.get(KEY_DONE) || {};
  const custom = store.get(KEY_CUSTOM) || {};
  const items = allItems();
  const nDone = items.filter(i=>done[i.id]).length;
  const hk = hoyKey();
  document.getElementById('view-tareas').innerHTML = `
    <div class="card" style="border-left:6px solid var(--deep)">
      <h2 style="font-size:20px">Tareas del viaje</h2>
      <p class="muted small" style="margin:4px 0 8px">${nDone}/${items.length} completadas. Se guardan en este móvil ✓</p>
      <div class="progressbar"><i style="width:${items.length?Math.round(nDone/items.length*100):0}%"></i></div>
    </div>
    ${DIAS.map(d=>{
      const extra = custom[d.k]||[];
      const today = d.k===hk;
      return `
      <div class="day-card ${today?'today':''}">
        <div class="dh"><h3>${d.f}</h3>${today?'<span class="today-tag">HOY</span>':''}<span class="where" style="background:${d.wc}">${d.w}</span></div>
        ${[...d.items, ...extra].map(it=>`
          <label class="todo ${done[it.id]?'done':''} ${it.ci?'checkin':''}">
            <input type="checkbox" ${done[it.id]?'checked':''} onchange="toggleTodo('${it.id}')">
            <span class="tx">${it.ci?'✈️ ':''}${it.t}${it.c?`<span class="ck">${it.c}</span>`:''}</span>
            ${it.custom?`<button class="del" onclick="delTodo(event,'${d.k}','${it.id}')" aria-label="Borrar">✕</button>`:''}
          </label>`).join('')}
        <div class="addrow">
          <input id="add-${d.k}" placeholder="Añadir tarea…" onkeydown="if(event.key==='Enter')addTodo('${d.k}')">
          <button onclick="addTodo('${d.k}')" aria-label="Añadir">+</button>
        </div>
      </div>`;
    }).join('')}
  `;
}
function toggleTodo(id){
  const done = store.get(KEY_DONE) || {};
  done[id] = !done[id];
  store.set(KEY_DONE, done);
  renderTareas();
}
function addTodo(dk){
  const inp = document.getElementById('add-'+dk);
  const t = (inp.value||'').trim();
  if(!t) return;
  const custom = store.get(KEY_CUSTOM) || {};
  (custom[dk] ||= []).push({id:'c-'+Date.now(), t, custom:true});
  store.set(KEY_CUSTOM, custom);
  renderTareas();
}
function delTodo(ev,dk,id){
  ev.preventDefault();
  const custom = store.get(KEY_CUSTOM) || {};
  custom[dk] = (custom[dk]||[]).filter(x=>x.id!==id);
  store.set(KEY_CUSTOM, custom);
  renderTareas();
}
renderTareas();

let stCity=null, stIdx=0;
function openStory(id){
  stCity=id; stIdx=0;
  const s=document.getElementById('story');
  s.querySelector('.bg').style.background =
    `linear-gradient(165deg, ${STORIES[id].color} 0%, color-mix(in srgb, ${STORIES[id].color} 45%, #0B2A2C) 100%)`;
  s.classList.add('on');
  document.body.style.overflow='hidden';
  renderStory();
}
function renderStory(){
  const st=STORIES[stCity], sl=st.slides[stIdx];
  const s=document.getElementById('story');
  s.querySelector('.bars').innerHTML = st.slides.map((_,i)=>`<i class="${i<=stIdx?'done':''}"></i>`).join('');
  const el=s.querySelector('.slide');
  el.style.animation='none'; void el.offsetWidth; el.style.animation='';
  el.innerHTML = `<div class="em">${sl.e}</div><div class="yr">${sl.y}</div><div class="tt">${sl.t}</div><div class="tx">${sl.x}</div>`;
}
function storyMove(dir){
  if(navigator.vibrate) navigator.vibrate(8);
  stIdx += dir;
  if(stIdx < 0){ stIdx = 0; return; }
  if(stIdx >= STORIES[stCity].slides.length){ closeStory(); return; }
  renderStory();
}
function closeStory(){
  document.getElementById('story').classList.remove('on');
  document.body.style.overflow='';
}
document.addEventListener('keydown', e=>{
  if(!document.getElementById('story').classList.contains('on')) return;
  if(e.key==='Escape') closeStory();
  if(e.key==='ArrowRight') storyMove(1);
  if(e.key==='ArrowLeft') storyMove(-1);
});

/* ================= CONVERSOR ================= */
function getRate(){ return store.get('co-rate') || 4500; }
function setRate(){
  const v = parseFloat(document.getElementById('rate').value.replace(',','.'));
  if(v>0) store.set('co-rate', v);
  document.getElementById('rate').value = getRate();
  convFrom('cop');
}
function convFrom(src){
  const cop = document.getElementById('cop'), eur = document.getElementById('eur');
  const num = s => parseFloat(String(s).replace(/\./g,'').replace(',','.'));
  if(src==='cop'){
    const v = num(cop.value);
    eur.value = isFinite(v) ? (v/getRate()).toLocaleString('es',{maximumFractionDigits:2}) : '';
  }else{
    const v = parseFloat(String(eur.value).replace(',','.'));
    cop.value = isFinite(v) ? Math.round(v*getRate()).toLocaleString('es') : '';
  }
}
function setCop(v){
  document.getElementById('cop').value = v.toLocaleString('es');
  convFrom('cop');
}
document.getElementById('rate').value = getRate();
setCop(50000);

/* ================= NAVEGACIÓN (con botón atrás del móvil) ================= */
function go(v, id){
  const hash = v==='ciudad' ? '#ciudad-'+id : '#'+v;
  if(location.hash !== hash){ location.hash = hash; return; } /* hashchange renderiza */
  render(v, id);
}
function render(v, id){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  document.getElementById('view-'+v).classList.add('on');
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('on'));
  const tb = document.getElementById('tab-'+(v==='ciudad'?'ciudades':v)); if(tb) tb.classList.add('on');
  window.scrollTo({top:0});
}
function route(){
  const hsh = location.hash || '#itinerario';
  if(hsh.startsWith('#ciudad-')){ buildCity(hsh.slice(8)); render('ciudad'); }
  else{
    const v = hsh.slice(1);
    render(['itinerario','ciudades','tareas','practico'].includes(v) ? v : 'itinerario');
  }
}
window.addEventListener('hashchange', route);
route();
